name: Android APK Build

on:
  push:
    branches: [main]
    paths:
      - 'androidapp/**'
      - 'index.html'
      - 'manifest.webmanifest'
      - 'sw.js'
      - 'icon-*.png'
      - '.github/workflows/android.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: androidapp
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Bundle web app into www/
        run: node scripts/bundle-web.mjs

      - name: Capacitor sync (android)
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Prepare APK for download
        run: cp android/app/build/outputs/apk/debug/app-debug.apk dokumenten-butler-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: dokumenten-butler-apk
          path: androidapp/dokumenten-butler-debug.apk
          if-no-files-found: error

      - name: Update release APK (v1.0.0)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cp dokumenten-butler-debug.apk dokumenten-butler.apk
          gh release upload v1.0.0 dokumenten-butler.apk --clobber -R ${{ github.repository }}
