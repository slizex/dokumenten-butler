<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
<meta name="theme-color" content="#1d4ed8">
<title>Dokumenten-Butler</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
<link rel="manifest" href="manifest.webmanifest">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Butler">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
/* ===== Dokumenten-Butler — Clean / Minimal (Inter, Sidebar-Dashboard) ===== */
*{box-sizing:border-box}
[hidden]{display:none!important}
:root{
 --bg:#fafafa;--panel:#ffffff;--panel2:#f4f4f5;
 --fg:#09090b;--muted:#71717a;--muted2:#a1a1aa;
 --border:#e7e7ea;--border2:#d4d4d8;
 --accent:#1d4ed8;--accent-fg:#ffffff;--gold:#b45309;
 --pos:#16a34a;--warn:#d97706;--neg:#dc2626;
 --radius:12px;--radius-sm:8px;
 --shadow-sm:0 1px 2px rgba(9,9,11,.05);
 --shadow:0 1px 3px rgba(9,9,11,.09),0 1px 2px rgba(9,9,11,.04);
 --shadow-lg:0 12px 34px -14px rgba(9,9,11,.30);
 --sidebar-w:248px;
}
body.dark{
 --bg:#09090b;--panel:#131316;--panel2:#1d1d20;
 --fg:#fafafa;--muted:#a1a1aa;--muted2:#71717a;
 --border:#27272a;--border2:#3f3f46;
 --accent:#60a5fa;--gold:#fbbf24;
 --shadow-sm:0 1px 2px rgba(0,0,0,.4);
 --shadow:0 1px 3px rgba(0,0,0,.5);
 --shadow-lg:0 14px 36px -14px rgba(0,0,0,.7);
}
html{-webkit-text-size-adjust:100%}
body{margin:0;font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--fg);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
h1,h2,h3{margin:0;font-weight:650;letter-spacing:-.012em}
a{color:var(--accent);text-decoration:none}
::selection{background:color-mix(in srgb,var(--accent) 26%,transparent)}
.muted{color:var(--muted)}.pos{color:var(--pos)}.neg{color:var(--neg)}

/* ---- Shell ---- */
.shell{display:grid;grid-template-columns:var(--sidebar-w) 1fr;min-height:100vh}
.sidebar{position:sticky;top:0;height:100vh;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:18px 14px;gap:4px;overflow-y:auto}
.brand{display:flex;align-items:center;gap:11px;padding:4px 8px 18px;font-weight:700;font-size:1.05rem;letter-spacing:-.02em}
.blogo{width:32px;height:32px;border-radius:9px;background:linear-gradient(140deg,var(--accent),color-mix(in srgb,var(--accent) 45%,#000));display:grid;place-items:center;color:#fff;flex:none;font-size:1.05rem}
.nav{display:flex;flex-direction:column;gap:2px}
.tab{display:flex;align-items:center;gap:11px;padding:9px 10px;border-radius:8px;border:none;background:none;color:var(--muted);font:inherit;font-weight:500;font-size:.92rem;cursor:pointer;text-align:left;width:100%;transition:background .12s,color .12s}
.tab .tcon{width:18px;height:18px;flex:none;display:grid;place-items:center;font-size:1rem}
.tab:hover{background:var(--panel2);color:var(--fg)}
.tab.active{background:color-mix(in srgb,var(--accent) 13%,transparent);color:var(--accent);font-weight:600}
.sidebar-foot{margin-top:auto;display:flex;flex-direction:column;gap:2px;padding-top:12px;border-top:1px solid var(--border)}
.content{min-width:0;display:flex;flex-direction:column}
.topbar2{height:58px;flex:none;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:0 24px;border-bottom:1px solid var(--border);position:sticky;top:0;background:color-mix(in srgb,var(--bg) 80%,transparent);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);z-index:20}
.pagetitle{font-size:1.02rem;font-weight:650;letter-spacing:-.01em;display:flex;align-items:center;gap:9px}
.topactions{display:flex;align-items:center;gap:10px}
main{padding:26px 24px 90px;width:100%;max-width:1060px;margin:0 auto}
.iconchip{display:inline-flex;align-items:center;justify-content:center;gap:7px;height:36px;min-width:36px;padding:0 11px;border:1px solid var(--border);border-radius:8px;background:var(--panel);color:var(--fg);cursor:pointer;font:inherit;font-weight:500;font-size:.85rem}
.iconchip:hover{background:var(--panel2)}
.bottomnav{display:none}

/* ---- Cards ---- */
.card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin:0 0 16px;box-shadow:var(--shadow-sm)}
.sect{font-size:1rem;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:760px){.grid2{grid-template-columns:1fr}}

/* ---- Buttons / Forms ---- */
button.primary{background:var(--accent);color:var(--accent-fg);border:none;border-radius:9px;padding:11px 18px;font:inherit;font-weight:600;cursor:pointer;box-shadow:var(--shadow-sm)}
button.primary:hover{filter:brightness(1.07)}
button.ghost{background:var(--panel);border:1px solid var(--border);border-radius:9px;padding:10px 16px;font:inherit;font-weight:500;color:var(--fg);cursor:pointer}
button.ghost:hover{background:var(--panel2)}
button.danger{background:none;border:1px solid color-mix(in srgb,var(--neg) 40%,transparent);color:var(--neg);border-radius:9px;padding:9px 14px;font:inherit;font-weight:500;cursor:pointer}
.linkbtn{background:none;border:none;color:var(--accent);font:inherit;font-weight:500;cursor:pointer;padding:0;display:block}
label.f{display:block;font-size:.83rem;font-weight:600;color:var(--muted);margin:12px 0 4px}
input[type=text],input[type=number],input[type=date],input[type=email],input[type=password],select,textarea{width:100%;padding:10px 12px;border:1px solid var(--border2);border-radius:9px;background:var(--panel);color:var(--fg);font:inherit;font-size:.95rem}
input:focus,select:focus,textarea:focus{outline:2px solid color-mix(in srgb,var(--accent) 45%,transparent);outline-offset:1px;border-color:var(--accent)}
textarea{min-height:74px;resize:vertical}
.formrow{display:grid;grid-template-columns:1fr 1fr;gap:0 14px}
@media(max-width:560px){.formrow{grid-template-columns:1fr}}
.btnrow{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}

/* ---- Dashboard ---- */
.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
@media(max-width:680px){.kpis{grid-template-columns:1fr 1fr}}
.kpi{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px}
.kpi .klabel{font-size:.78rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.kpi .kval{font-size:1.5rem;font-weight:700;letter-spacing:-.02em;margin-top:2px}
.kpi .ksub{font-size:.8rem;color:var(--muted2)}
.bigadd{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:16px;border:2px dashed var(--border2);border-radius:var(--radius);background:none;color:var(--muted);font:inherit;font-weight:600;font-size:1rem;cursor:pointer;margin-bottom:16px}
.bigadd:hover{border-color:var(--accent);color:var(--accent);background:color-mix(in srgb,var(--accent) 5%,transparent)}

/* ---- Fristen / Ampel ---- */
.frow{display:flex;align-items:center;gap:12px;padding:12px 4px;border-bottom:1px solid var(--border)}
.frow:last-child{border-bottom:none}
.dot{width:12px;height:12px;border-radius:50%;flex:none}
.dot.red{background:var(--neg);box-shadow:0 0 0 4px color-mix(in srgb,var(--neg) 18%,transparent)}
.dot.amber{background:var(--warn);box-shadow:0 0 0 4px color-mix(in srgb,var(--warn) 18%,transparent)}
.dot.green{background:var(--pos)}
.dot.gray{background:var(--muted2)}
.fmain{flex:1;min-width:0;cursor:pointer}
.ftitle{font-weight:600;font-size:.95rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fsub{font-size:.83rem;color:var(--muted)}
.fsub b{color:var(--fg)}
.fact{display:flex;gap:6px;flex:none}

/* ---- Verträge ---- */
.clist{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:760px){.clist{grid-template-columns:1fr}}
.ccard{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer;box-shadow:var(--shadow-sm);transition:border-color .12s}
.ccard:hover{border-color:var(--accent)}
.chead{display:flex;align-items:center;gap:10px}
.cicon{width:38px;height:38px;border-radius:10px;background:var(--panel2);display:grid;place-items:center;font-size:1.15rem;flex:none}
.cname{font-weight:650;font-size:.97rem;line-height:1.25}
.csub{font-size:.8rem;color:var(--muted)}
.cmeta{display:flex;justify-content:space-between;align-items:center;margin-top:12px;font-size:.85rem}
.ccost{font-weight:650}
.badge{display:inline-flex;align-items:center;gap:5px;padding:2px 9px;border-radius:99px;font-size:.75rem;font-weight:600}
.badge.red{background:color-mix(in srgb,var(--neg) 13%,transparent);color:var(--neg)}
.badge.amber{background:color-mix(in srgb,var(--warn) 14%,transparent);color:var(--warn)}
.badge.green{background:color-mix(in srgb,var(--pos) 12%,transparent);color:var(--pos)}
.badge.gray{background:var(--panel2);color:var(--muted)}
.badge.law{background:color-mix(in srgb,var(--accent) 11%,transparent);color:var(--accent)}
.dgrid{display:grid;grid-template-columns:auto 1fr;gap:6px 18px;font-size:.92rem;margin:10px 0}
.dgrid .dk{color:var(--muted);white-space:nowrap}
.dgrid .dv{font-weight:550;overflow-wrap:anywhere}

/* ---- Dokumente ---- */
.docrow{display:flex;gap:12px;padding:13px 4px;border-bottom:1px solid var(--border);align-items:flex-start}
.docrow:last-child{border-bottom:none}
.dicon{width:36px;height:36px;border-radius:9px;background:var(--panel2);display:grid;place-items:center;font-size:1.05rem;flex:none;margin-top:2px}
.dbody{flex:1;min-width:0}
.dname{font-weight:600;font-size:.92rem;overflow-wrap:anywhere}
.dsum{font-size:.85rem;color:var(--muted);margin-top:2px}
.dmeta{font-size:.78rem;color:var(--muted2);margin-top:3px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.dact{display:flex;flex-direction:column;gap:6px;flex:none}
.dact button{font-size:.8rem;padding:6px 10px}
.filterbar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.filterbar select,.filterbar input{width:auto;flex:1;min-width:130px}

/* ---- Upload / KI ---- */
.upzone{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:560px){.upzone{grid-template-columns:1fr}}
.upbtn{display:flex;flex-direction:column;align-items:center;gap:8px;padding:26px 14px;border:2px dashed var(--border2);border-radius:var(--radius);background:none;color:var(--fg);font:inherit;font-weight:600;cursor:pointer}
.upbtn:hover{border-color:var(--accent);color:var(--accent);background:color-mix(in srgb,var(--accent) 5%,transparent)}
.upbtn .uic{font-size:1.9rem}
.upbtn .usub{font-size:.8rem;font-weight:400;color:var(--muted)}
.aiwork{display:flex;align-items:center;gap:12px;padding:14px}
.spin{width:22px;height:22px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:sp 0.9s linear infinite;flex:none}
@keyframes sp{to{transform:rotate(360deg)}}
.ainote{background:color-mix(in srgb,var(--accent) 7%,transparent);border:1px solid color-mix(in srgb,var(--accent) 25%,transparent);border-radius:var(--radius-sm);padding:12px 14px;font-size:.9rem;margin:12px 0}
.wichtig{margin:8px 0 0;padding-left:20px;font-size:.9rem}
.wichtig li{margin:3px 0}

/* ---- Personen / Mandanten ---- */
.personbar{display:flex;gap:8px;overflow-x:auto;padding:2px 0 12px;margin:0 0 4px;-webkit-overflow-scrolling:touch}
.pchip{flex:none;display:inline-flex;align-items:center;gap:7px;padding:7px 13px;border:1px solid var(--border);border-radius:99px;background:var(--panel);color:var(--fg);font:inherit;font-size:.85rem;font-weight:500;cursor:pointer;white-space:nowrap}
.pchip:hover{background:var(--panel2)}
.pchip.on{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 12%,transparent);color:var(--accent);font-weight:600}
.pdot{width:11px;height:11px;border-radius:50%;flex:none;background:var(--muted2)}
.pbadge{display:inline-flex;align-items:center;gap:5px;padding:2px 9px;border-radius:99px;font-size:.75rem;font-weight:600;background:var(--panel2);color:var(--fg)}
.pbadge .pdot{width:8px;height:8px}
.personmgr{display:flex;flex-direction:column;gap:8px}
.prow{display:flex;align-items:center;gap:10px;padding:9px 12px;border:1px solid var(--border);border-radius:9px}
.prow .pname{flex:1;font-weight:600;display:flex;align-items:center;gap:8px}
.prow button{flex:none;font-size:.8rem;padding:5px 10px}

/* ---- Rechnungs-Verlauf ---- */
.invrow{display:flex;align-items:center;gap:12px;padding:10px 4px;border-bottom:1px solid var(--border);font-size:.9rem}
.invrow:last-child{border-bottom:none}
.invp{flex:1;min-width:0}
.invper{font-weight:600}
.invd{font-size:.8rem;color:var(--muted)}
.invb{flex:none;font-weight:650;text-align:right}
.invdelta{font-size:.78rem;font-weight:600;margin-left:8px}
.invdelta.up{color:var(--neg)}.invdelta.down{color:var(--pos)}.invdelta.same{color:var(--muted2)}
.invmini{display:flex;align-items:flex-end;gap:3px;height:34px;margin:6px 0 2px}
.invmini .imb{flex:1;background:color-mix(in srgb,var(--accent) 40%,transparent);border-radius:2px 2px 0 0;min-height:3px}

/* ---- Gesundheit ---- */
.medgroup{margin:0 0 18px}
.medghead{display:flex;align-items:center;gap:9px;font-weight:650;font-size:.98rem;margin:0 0 8px;padding:0 2px}
.medghead .fcount{color:var(--muted);font-weight:500;font-size:.82rem}
.badge.fach{background:color-mix(in srgb,#0891b2 14%,transparent);color:#0e7490}
body.dark .badge.fach{color:#67e8f9}
.medfilter{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.medfilter select{width:auto;flex:1;min-width:150px}
.behnote{font-size:.85rem;color:var(--muted);margin-top:2px;font-style:italic}

/* ---- Butler-Tipps / Kosten-Aufschlüsselung ---- */
.tiprow{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 4px;border-bottom:1px solid var(--border);font-size:.9rem}
.tiprow:last-child{border-bottom:none}
.tiprow button{flex:none;font-size:.8rem;padding:6px 10px}
.kcat{display:flex;align-items:center;gap:10px;padding:6px 0;font-size:.88rem}
.kcat .kcl{width:170px;flex:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
@media(max-width:560px){.kcat .kcl{width:120px}}
.kbarw{flex:1;height:8px;background:var(--panel2);border-radius:99px;overflow:hidden}
.kbar{display:block;height:100%;background:var(--accent);border-radius:99px}
.kcv{flex:none;min-width:82px;text-align:right;font-weight:600}

/* ---- Einstellungen / Haushalt ---- */
.acclabel{font-size:.82rem;font-weight:650;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:4px 0 8px}
.accsep{margin-top:26px;padding-top:18px;border-top:1px solid var(--border)}
.hhlist{display:flex;flex-direction:column;gap:8px}
.hhopt{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;border:1px solid var(--border);border-radius:9px;background:var(--panel);font:inherit;cursor:pointer;color:var(--fg)}
.hhopt.active{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 7%,transparent)}
.hhopt .hhname{font-weight:600}
.hhopt .hhtag{font-size:.8rem;color:var(--muted)}
.hhopt.active .hhtag{color:var(--accent);font-weight:600}
.hhadd{display:flex;gap:8px}
.hhadd input{flex:1}
.inviteout{margin-top:10px;padding:12px;border:1px dashed var(--border2);border-radius:9px;font-size:.9rem}
.invcode{font-size:1.15rem;letter-spacing:.08em}
.invcopy{margin-left:10px;font-size:.8rem;padding:4px 10px;border:1px solid var(--border);border-radius:7px;background:var(--panel);cursor:pointer;color:var(--fg)}
.invhint{color:var(--muted);font-size:.82rem;margin:8px 0 0}

/* ---- Auth ---- */
.authscreen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:100;padding:20px}
.authscreen[hidden]{display:none}
.authcard{width:100%;max-width:400px;background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:30px 28px;box-shadow:var(--shadow-lg)}
.authlogo{width:52px;height:52px;border-radius:14px;background:linear-gradient(140deg,#1d4ed8,#172554);display:grid;place-items:center;font-size:1.6rem;margin:0 auto 14px}
.authcard h1{text-align:center;font-size:1.25rem}
.authsub{text-align:center;color:var(--muted);font-size:.88rem;margin:6px 0 18px}
.authmsg{padding:10px 12px;border-radius:9px;font-size:.87rem;margin-bottom:12px;background:var(--panel2)}
.authmsg.err{background:color-mix(in srgb,var(--neg) 10%,transparent);color:var(--neg)}
.authmsg.ok{background:color-mix(in srgb,var(--pos) 10%,transparent);color:var(--pos)}
.authcard label{display:block;font-size:.83rem;font-weight:600;color:var(--muted);margin:12px 0 4px}
.authbtns{display:flex;flex-direction:column;gap:9px;margin-top:18px}
.authforgot{text-align:center;margin-top:14px;font-size:.85rem}
body.app-hidden .shell{display:none}

/* ---- App-Sperre (nur native App) ---- */
.lockscreen{position:fixed;inset:0;z-index:300;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 20px;gap:6px}
.lockscreen[hidden]{display:none}
.locklogo{width:56px;height:56px;border-radius:15px;background:linear-gradient(140deg,#1d4ed8,#172554);display:grid;place-items:center;font-size:1.7rem;margin-bottom:6px}
.locktitle{font-size:1.15rem;font-weight:650}
.locksub{color:var(--muted);font-size:.9rem;margin-bottom:12px;text-align:center;min-height:20px}
.lockdots{display:flex;gap:14px;margin:8px 0 20px}
.lockdot{width:15px;height:15px;border-radius:50%;border:2px solid var(--border2);background:transparent;transition:background .1s}
.lockdot.on{background:var(--accent);border-color:var(--accent)}
.lockdots.err .lockdot{border-color:var(--neg);animation:lshake .3s}
@keyframes lshake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.keypad{display:grid;grid-template-columns:repeat(3,72px);gap:14px;justify-content:center}
.keybtn{width:72px;height:72px;border-radius:50%;border:1px solid var(--border);background:var(--panel);color:var(--fg);font-size:1.5rem;font-weight:500;cursor:pointer;display:grid;place-items:center}
.keybtn:active{background:var(--panel2)}
.keybtn.wide{font-size:1rem}
.lockbio{margin-top:18px;background:none;border:none;color:var(--accent);font:inherit;font-weight:600;font-size:.95rem;cursor:pointer;display:flex;align-items:center;gap:8px}

/* ---- Toast ---- */
#toast{position:fixed;left:50%;bottom:26px;transform:translate(-50%,20px);background:#26262b;color:#fff;padding:13px 20px;border-radius:10px;font-size:.9rem;font-weight:500;opacity:0;pointer-events:none;transition:all .22s;z-index:200;box-shadow:var(--shadow-lg);max-width:min(480px,90vw);min-height:24px}
#toast.show{opacity:1;transform:translate(-50%,0)}
#toast.err{background:#b3261e}

/* ---- Mobile ---- */
@media(max-width:900px){
 .shell{grid-template-columns:1fr}
 .sidebar{display:none}
 main{padding:18px 14px 96px}
 .bottomnav{display:flex;position:fixed;left:0;right:0;bottom:0;background:var(--panel);border-top:1px solid var(--border);z-index:30;padding:4px 6px calc(4px + env(safe-area-inset-bottom))}
 .bottomnav .tab{flex-direction:column;gap:2px;font-size:.68rem;padding:7px 2px;align-items:center;text-align:center;border-radius:10px}
 .bottomnav .tab .tcon{font-size:1.25rem;width:auto;height:auto}
}
@media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body class="app-hidden">

<div id="authscreen" class="authscreen" hidden>
  <div class="authcard">
    <div class="authlogo">🎩</div>
    <h1>Dokumenten-Butler</h1>
    <p class="authsub" id="auth_sub">Bitte melde dich an – dein Butler kümmert sich um den Papierkram.</p>
    <div id="auth_msg" class="authmsg" hidden></div>
    <div id="auth_login_panel">
      <label for="auth_email">E-Mail</label>
      <input id="auth_email" type="email" autocomplete="username" placeholder="name@beispiel.de">
      <label for="auth_pass">Passwort</label>
      <input id="auth_pass" type="password" autocomplete="current-password" placeholder="••••••••">

function addMonthsISO(iso,months){

}

/* ---------- Fristenlogik ----------
   Liefert {kind, level, end, lastDay, days, label, sub, neuesRecht}
   kind: fest | flex | unbekannt | gekuendigt | beendet */
function fristInfo(c){
  if(c.status==="beendet")return {kind:"beendet",level:"gray",label:"Beendet",sub:""};
  if(c.status==="gekuendigt")return {kind:"gekuendigt",level:"gray",label:"Gekündigt"+(c.gekuendigt_zum?" zum "+fmtDate(c.gekuendigt_zum):""),sub:""};
  var ml=c.mindestlaufzeit_monate,kf=c.kuendigungsfrist_monate,vl=c.verlaengerung_monate;
  var neu=!!(c.vertragsstart&&c.vertragsstart>=NEUES_RECHT_AB);
  if(ml===0||(ml==null&&vl===1)){
    var f=(kf==null?1:kf);
    return {kind:"flex",level:"green",label:"Jederzeit kündbar",sub:"Kündigungsfrist "+fristTxt(f),neuesRecht:false};
  }
  if(!c.vertragsstart||ml==null){
    return {kind:"unbekannt",level:"gray",label:"Fristen unbekannt",sub:"Vertragsbeginn/Laufzeit ergänzen, dann rechnet der Butler.",neuesRecht:false};
  }
  if(kf==null)kf=1;
  var initialEnd=addMonthsISO(c.vertragsstart,ml);
  var lastDay=addMonthsISO(initialEnd,-kf);
  var today=todayISO();
  if(today<=lastDay){
    var days=daysUntil(lastDay);
    return {kind:"fest",level:ampel(days),end:initialEnd,lastDay:lastDay,days:days,
      label:"Kündbar zum "+fmtDate(initialEnd),
      sub:"Letzter Kündigungstag: "+fmtDate(lastDay)+" (in "+days+" Tagen)",neuesRecht:false};
  }
  /* Erstlaufzeit(-Fenster) vorbei → Verlängerungsphase */
  var effVl=neu?1:(vl==null?12:vl);
  var effKf=neu?Math.min(kf,1):kf;
  if(effVl<=1){
    return {kind:"flex",level:"green",label:"Jederzeit kündbar",sub:"Kündigungsfrist "+fristTxt(effKf)+(neu?" · nach neuem Recht (ab 3/2022) monatlich kündbar":""),neuesRecht:neu};
  }
  var end=initialEnd,guard=0;
  while(addMonthsISO(end,-effKf)<today&&guard<600){end=addMonthsISO(end,effVl);guard++;}
  var ld=addMonthsISO(end,-effKf),dy=daysUntil(ld);
  return {kind:"fest",level:ampel(dy),end:end,lastDay:ld,days:dy,
    label:"Kündbar zum "+fmtDate(end),
    sub:"Letzter Kündigungstag: "+fmtDate(ld)+" (in "+dy+" Tagen) · Altvertrag: verlängert sich um "+effVl+" Monate",neuesRecht:false};
}
function ampel(days){return days<=30?"red":(days<=90?"amber":"green");}
function fristTxt(m){if(m==null)return "unbekannt";if(m===0.5)return "2 Wochen";if(m===1)return "1 Monat";if(m<1)return Math.round(m*30)+" Tage";return m+" Monate";}
function monatskosten(c){
  if(c.kosten==null||c.status!=="aktiv")return 0;
  var m=INTERVALL[c.kosten_intervall];
  if(!m)return 0; /* einmalig/unbekannt zählt nicht laufend */
  return Number(c.kosten)/m;
}

    "UID:"+uid,"DTSTAMP:"+stamp,"DTSTART;VALUE=DATE:"+dt,

    "END:VEVENT","END:VCALENDAR"];
  var blob=new Blob([lines.join("\r\n")],{type:"text/calendar;charset=utf-8"});

var ALLOWED_IMG={"image/jpeg":1,"image/png":1,"image/webp":1,"image/gif":1};
function compressImage(file){
  return new Promise(function(res,rej){
    var url=URL.createObjectURL(file),img=new Image();
    img.onload=function(){
      var max=1800,w=img.naturalWidth,h=img.naturalHeight;
      var sc=Math.min(1,max/Math.max(w,h));
      var cv=document.createElement("canvas");cv.width=Math.round(w*sc);cv.height=Math.round(h*sc);
      cv.getContext("2d").drawImage(img,0,0,cv.width,cv.height);
      URL.revokeObjectURL(url);
      cv.toBlob(function(b){if(b)res(b);else rej(new Error("Bild konnte nicht verarbeitet werden."));},"image/jpeg",0.82);
    };
    img.onerror=function(){URL.revokeObjectURL(url);rej(new Error("Bildformat wird nicht unterstützt. Bitte JPG/PNG oder PDF verwenden."));};
    img.src=url;
  });
}

async function prepareAndIngest(file){
  if(isEmlFile(file))return prepareEmail(file);
  var isPdf=file.type==="application/pdf"||/\.pdf$/i.test(file.name||"");
  if(!isPdf&&!ALLOWED_IMG[file.type]&&!/^image\//.test(file.type))throw new Error("Format nicht unterstützt (nur PDF, Foto oder .eml)");
  if(isPdf&&file.size>12*1024*1024)throw new Error("PDF größer als 12 MB");
  var blob=file,mime=file.type||"application/pdf",fname=file.name||("scan-"+Date.now()+".jpg");
  if(!isPdf){blob=await compressImage(file);mime="image/jpeg";fname=fname.replace(/\.[^.]+$/,"")+".jpg";}
  return ingest({blob:blob,mime:mime,fname:fname});

/* E-Mail: .eml parsen, PDF-/Bild-Anhang bevorzugt analysieren, sonst den Text-Body */
async function prepareEmail(file){
  if(file.size>20*1024*1024)throw new Error("E-Mail größer als 20 MB");
  var raw=await file.text();
  var mail;try{mail=parseEml(raw);}catch(e){mail={text:raw,attachments:[],subject:""};}
  var att=(mail.attachments||[]).filter(function(a){return a.mime==="application/pdf"||/^image\//.test(a.mime);});
  var emlName=(file.name||"email.eml");
  if(att.length){
    var a=att[0];
    var blob=new Blob([a.bytes],{type:a.mime}),fname=a.filename||("anhang"+(a.mime==="application/pdf"?".pdf":".bin"));
    return ingest({blob:blob,mime:a.mime,fname:fname,emailFrom:emlName,emailSubject:mail.subject});
  }
  var body=(mail.text||raw||"").trim();
  if(!body)throw new Error("Kein lesbarer Inhalt in der E-Mail");
  return ingest({blob:new Blob([raw],{type:"message/rfc822"}),mime:"message/rfc822",fname:emlName,textContent:body,emailSubject:mail.subject});
}

async function ingest(opts){
  var safe=(opts.fname||"dokument").replace(/[^\wäöüÄÖÜß.\-]+/g,"_").slice(-80);
  var path=activeHousehold+"/"+Date.now()+"_"+Math.random().toString(36).slice(2,7)+"_"+safe;
  var up=await sb.storage.from(BUCKET).upload(path,opts.blob,{contentType:opts.mime,upsert:false});
  if(up.error)throw up.error;
  var note=opts.emailSubject?("Aus E-Mail: "+opts.emailSubject):(opts.emailFrom?"Aus E-Mail-Anhang":null);
  var ins=await sb.from("documents").insert({household_id:activeHousehold,filename:opts.fname,storage_path:path,mime_type:opts.mime,size_bytes:opts.blob.size,doc_type:"sonstiges",note:note}).select("*").single();
  if(ins.error)throw ins.error;
  var docRow=ins.data,ext=null;
  try{
    var reqBody=opts.textContent?{textContent:opts.textContent}:{fileBase64:await blobToBase64(opts.blob),mimeType:opts.mime};
    var r=await sb.functions.invoke(EDGE_FN,{body:reqBody});
    if(r.error)throw r.error;
    var body=r.data||{};if(body.error)throw new Error(body.error);
    ext=body.dokument||null;
  }catch(e){
    var res0={name:opts.fname||"Dokument",icon:"⚠️",text:"abgelegt, aber KI-Analyse fehlgeschlagen",view:"docs",id:docRow.id};
    importResults.push(res0);return res0;
  }
  try{
    var pm=(ext&&ext.vertragspartner)?matchPerson(ext.vertragspartner):null;
    var upd={extracted:ext,doc_type:(ext&&DOCTYPE[ext.docType])?ext.docType:"sonstiges",doc_date:(ext&&ext.datum)||null,zusammenfassung:(ext&&ext.zusammenfassung)||null};
    if(pm)upd.person_id=pm.id;else if(activePerson)upd.person_id=activePerson;
    if(ext&&ext.istMedizin){
      upd.bereich="medizin";
      upd.fachrichtung=(ext.fachrichtung&&FACH[ext.fachrichtung])?ext.fachrichtung:"sonstiges";
      upd.arzt=ext.arzt||null;
      upd.med_typ=(ext.medTyp&&MEDTYP[ext.medTyp])?ext.medTyp:(ext.docType==="rechnung"?"rechnung":"sonstiges");
      upd.betrag=(ext.betrag!=null?Number(ext.betrag):null);
      upd.behandlungsdatum=ext.datum||null;
    }
    await sb.from("documents").update(upd).eq("id",docRow.id);
  }catch(e){}
  var result=await autoFileDoc(docRow.id,ext);
  importResults.push(result);
  return result;
}

/* ---------- Minimaler MIME-/E-Mail-Parser (clientseitig) ---------- */
function parseEml(raw){
  var top=splitHeaderBody(raw);
  var headers=parseHeaders(top.head);
  var subject=decodeMimeWords(headers["subject"]||"");
  var out={subject:subject,text:"",html:"",attachments:[]};
  walkMimePart(headers,top.body,out);
  if(!out.text&&out.html)out.text=htmlToText(out.html);
  return out;
}
function splitHeaderBody(s){
  var i=s.indexOf("\r\n\r\n");var sep=4;
  if(i<0){i=s.indexOf("\n\n");sep=2;}
  if(i<0)return {head:s,body:""};
  return {head:s.slice(0,i),body:s.slice(i+sep)};
}
function parseHeaders(head){
  var lines=head.split(/\r?\n/),h={},cur=null;
  lines.forEach(function(l){
    if(/^[ \t]/.test(l)&&cur){h[cur]+=" "+l.trim();return;}
    var m=l.match(/^([!-9;-~]+):\s?(.*)$/);
    if(m){cur=m[1].toLowerCase();h[cur]=(h[cur]?h[cur]+" ":"")+m[2];}
  });
  return h;
}
function headerParam(val,name){
  if(!val)return "";
  var m=val.match(new RegExp(name+'\\s*=\\s*"([^"]*)"','i'))||val.match(new RegExp(name+'\\s*=\\s*([^;\\s]+)','i'));
  return m?m[1]:"";
}
function walkMimePart(headers,body,out){
  var ct=(headers["content-type"]||"text/plain").toLowerCase();
  var cte=(headers["content-transfer-encoding"]||"").toLowerCase().trim();
  var disp=(headers["content-disposition"]||"").toLowerCase();
  var fname=decodeMimeWords(headerParam(headers["content-disposition"],"filename")||headerParam(headers["content-type"],"name"));
  if(ct.indexOf("multipart/")===0){
    var boundary=headerParam(headers["content-type"],"boundary");
    if(!boundary)return;
    var parts=splitMultipart(body,boundary);
    parts.forEach(function(p){
      var sub=splitHeaderBody(p);
      walkMimePart(parseHeaders(sub.head),sub.body,out);
    });
    return;
  }
  var isAttachment=disp.indexOf("attachment")>=0||!!fname||(ct.indexOf("application/")===0&&ct.indexOf("application/pkcs7")<0);
  if(ct.indexOf("text/plain")===0&&!isAttachment){out.text+=(out.text?"\n":"")+decodeText(body,cte,ct);return;}
  if(ct.indexOf("text/html")===0&&!isAttachment){out.html+=decodeText(body,cte,ct);return;}
  /* Anhang */
  var mime=ct.split(";")[0].trim()||"application/octet-stream";
  if(mime==="application/pdf"||/^image\//.test(mime)||isAttachment){
    var bytes=(cte==="base64")?base64ToBytes(body):new TextEncoder().encode(body);
    out.attachments.push({filename:fname||("anhang."+(mime==="application/pdf"?"pdf":(mime.split("/")[1]||"bin"))),mime:mime,bytes:bytes});
  }
}
function splitMultipart(body,boundary){
  var b="--"+boundary;
  var chunks=body.split(b);
  var parts=[];
  chunks.forEach(function(c){
    if(c===""||/^--\s*$/.test(c.trim().slice(0,4)))return;
    if(c.slice(0,2)==="--")return; /* Abschluss */
    var t=c.replace(/^\r?\n/,"").replace(/\r?\n$/,"");
    if(t.trim())parts.push(t);
  });
  return parts;
}
function decodeText(body,cte,ct){
  var charset=(headerParam(ct,"charset")||"utf-8").toLowerCase();
  var bytes;
  if(cte==="base64")bytes=base64ToBytes(body);
  else if(cte==="quoted-printable")bytes=qpToBytes(body);
  else return body;
  try{return new TextDecoder(charset).decode(bytes);}catch(e){try{return new TextDecoder("utf-8").decode(bytes);}catch(e2){return body;}}
}
function base64ToBytes(s){
  var clean=(s||"").replace(/[^A-Za-z0-9+/=]/g,"");
  try{var bin=atob(clean);var arr=new Uint8Array(bin.length);for(var i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);return arr;}
  catch(e){return new Uint8Array(0);}
}
function qpToBytes(s){
  s=(s||"").replace(/=\r?\n/g,""); /* Soft-Line-Breaks */
  var out=[];
  for(var i=0;i<s.length;i++){
    var ch=s[i];
    if(ch==="="&&i+2<s.length){var hex=s.substr(i+1,2);if(/^[0-9A-Fa-f]{2}$/.test(hex)){out.push(parseInt(hex,16));i+=2;continue;}}
    out.push(ch.charCodeAt(0)&0xff);
  }
  return new Uint8Array(out);
}
function decodeMimeWords(s){
  if(!s)return "";
  return s.replace(/=\?([^?]+)\?([BbQq])\?([^?]*)\?=/g,function(_,cs,enc,txt){
    try{
      var bytes;
      if(/b/i.test(enc))bytes=base64ToBytes(txt);
      else bytes=qpToBytes(txt.replace(/_/g," "));
      return new TextDecoder(cs).decode(bytes);
    }catch(e){return txt;}
  }).replace(/\s+/g," ").trim();
}
function htmlToText(html){
  var s=String(html||"");
  s=s.replace(/<style[\s\S]*?<\/style>/gi,"").replace(/<script[\s\S]*?<\/script>/gi,"");
  s=s.replace(/<\/(p|div|tr|h[1-6]|li)>/gi,"\n").replace(/<br\s*\/?>/gi,"\n");
  s=s.replace(/<[^>]+>/g," ");
  var ta=document.createElement("textarea");ta.innerHTML=s;s=ta.value;
  return s.replace(/[ \t]+/g," ").replace(/\n{3,}/g,"\n\n").trim();
}

function findMatch(ext){

  var kd=(ext.kundennummer||"").replace(/\s+/g,"").toLowerCase();
  var vn=(ext.vertragsnummer||"").replace(/\s+/g,"").toLowerCase();
  var ab=(ext.anbieter||"").toLowerCase();
  var best=null;
  CONTRACTS.forEach(function(c){
    var ckd=(c.kundennummer||"").replace(/\s+/g,"").toLowerCase();
    var cvn=(c.vertragsnummer||"").replace(/\s+/g,"").toLowerCase();
    if(kd&&ckd&&kd===ckd){best=c;return;}
    if(vn&&cvn&&vn===cvn){best=c;return;}
    if(!best&&ab&&c.anbieter&&(ab.indexOf(c.anbieter.toLowerCase())>=0||c.anbieter.toLowerCase().indexOf(ab)>=0)&&(ext.kategorie===c.kategorie))best=c;
  });
  return best;
}

  });

/* Butler-Tipps: proaktive Hinweise, wo der User etwas tun sollte */
function butlerTips(CS,DS){
  var tips=[];
  CS.forEach(function(c){
    var f=fristInfo(c);
    if(c.status==="aktiv"&&f.kind==="unbekannt")
      tips.push({txt:'Bei „'+escapeHtml(c.anbieter||"?")+'“ fehlen Vertragsbeginn oder Mindestlaufzeit – ergänze sie, dann überwacht der Butler die Kündigungsfrist.',btn:"Ergänzen",action:"edit-contract",id:c.id});
    if(c.status==="gekuendigt"&&c.gekuendigt_zum&&c.gekuendigt_zum<todayISO())
      tips.push({txt:'„'+escapeHtml(c.anbieter||"?")+'“ war zum '+fmtDate(c.gekuendigt_zum)+' gekündigt und ist inzwischen abgelaufen.',btn:"Als beendet markieren",action:"tip-ended",id:c.id});
  });
  var unlinked=DS.filter(function(d){return !isMed(d)&&!d.contract_id&&["vertrag","rechnung","police","preisaenderung","kuendigung"].indexOf(d.doc_type)>=0;}).length;
  if(unlinked)tips.push({txt:unlinked+(unlinked===1?" Dokument ist":" Dokumente sind")+" noch keinem Vertrag zugeordnet – zugeordnet findet der Butler sie schneller wieder.",btn:"Ansehen",nav:"docs"});
  /* Dokumente ohne Person (nur wenn es überhaupt Personen gibt) */
  if(PERSONS.length){
    var noperson=DS.filter(function(d){return !d.person_id&&(isMed(d)||["vertrag","rechnung","police"].indexOf(d.doc_type)>=0);}).length;
    if(noperson&&!activePerson)tips.push({txt:noperson+(noperson===1?" Dokument ist":" Dokumente sind")+" noch keiner Person zugeordnet – ordne sie zu, um klar zu trennen, wem was gehört.",btn:"Ansehen",nav:"docs"});
  }
  if(!tips.length)return "";
  return '<section class="card"><h2 class="sect">🎩 Butler-Tipps</h2>'+tips.map(function(t){
    var b=t.nav?'<button class="ghost" data-nav="'+t.nav+'">'+t.btn+'</button>':'<button class="ghost" data-action="'+t.action+'" data-id="'+t.id+'">'+t.btn+'</button>';
    return '<div class="tiprow"><span>'+t.txt+'</span>'+b+'</div>';
  }).join("")+'</section>';
}
/* Monatskosten nach Kategorie (nur wenn mindestens 2 Kategorien Kosten haben) */
function costBreakdown(CS){
  var sums={};
  CS.forEach(function(c){var m=monatskosten(c);if(m>0)sums[c.kategorie]=(sums[c.kategorie]||0)+m;});
  var keys=Object.keys(sums);if(keys.length<2)return "";
  keys.sort(function(a,b){return sums[b]-sums[a];});
  var max=sums[keys[0]];
  return '<section class="card"><h2 class="sect">💶 Monatskosten nach Kategorie</h2>'+keys.map(function(k){
    var ki=katInfo(k);
    return '<div class="kcat"><span class="kcl">'+ki.icon+' '+ki.label+'</span><span class="kbarw"><span class="kbar" style="width:'+Math.max(4,Math.round(sums[k]/max*100))+'%"></span></span><span class="kcv">'+fmtEur(sums[k])+'</span></div>';
  }).join("")+'</section>';
}
/* Monatskosten nach Person – nur wenn Personen existieren und kein Personen-Filter aktiv */
function costByPerson(){
  if(!PERSONS.length||activePerson)return "";
  var sums={},ohne=0;
  CONTRACTS.forEach(function(c){var m=monatskosten(c);if(m<=0)return;if(c.person_id)sums[c.person_id]=(sums[c.person_id]||0)+m;else ohne+=m;});
  var entries=PERSONS.filter(function(p){return sums[p.id];}).map(function(p){return {name:p.name,color:personColor(p),val:sums[p.id]};});
  if(ohne>0)entries.push({name:"ohne Person",color:"#a1a1aa",val:ohne});
  if(entries.length<2)return "";
  entries.sort(function(a,b){return b.val-a.val;});
  var max=entries[0].val;
  return '<section class="card"><h2 class="sect">👥 Monatskosten nach Person</h2>'+entries.map(function(e){
    return '<div class="kcat"><span class="kcl"><span class="pdot" style="background:'+e.color+';display:inline-block;margin-right:6px"></span>'+escapeHtml(e.name)+'</span><span class="kbarw"><span class="kbar" style="width:'+Math.max(4,Math.round(e.val/max*100))+'%"></span></span><span class="kcv">'+fmtEur(e.val)+'</span></div>';
  }).join("")+'</section>';
}

/* Monatsrechnungen: aus zugeordneten Rechnungs-Dokumenten Verlauf + Trend bauen */
function invoiceDate(d){
  var e=d.extracted||{};
  return e.zeitraumBis||e.zeitraumVon||d.doc_date||e.datum||String(d.created_at).slice(0,10);
}
function invoiceHistory(c){
  var invs=DOCS.filter(function(d){return d.contract_id===c.id&&d.doc_type==="rechnung";})
    .map(function(d){var e=d.extracted||{};return {doc:d,betrag:(e.betrag!=null?Number(e.betrag):null),von:e.zeitraumVon||null,bis:e.zeitraumBis||null,date:invoiceDate(d)};})
    .sort(function(a,b){return String(a.date).localeCompare(String(b.date));});
  if(!invs.length)return "";
  var withBetrag=invs.filter(function(i){return i.betrag!=null;});
  var mini="";
  if(withBetrag.length>=2){
    var max=Math.max.apply(null,withBetrag.map(function(i){return i.betrag;}))||1;
    mini='<div class="invmini">'+withBetrag.map(function(i){return '<span class="imb" style="height:'+Math.max(6,Math.round(i.betrag/max*100))+'%" title="'+fmtEur(i.betrag)+'"></span>';}).join("")+'</div>';
  }
  var sum=withBetrag.reduce(function(s,i){return s+i.betrag;},0);
  var avg=withBetrag.length?sum/withBetrag.length:null;
  var rows=invs.slice().reverse().map(function(i,idx,arr){
    var e=i.doc.extracted||{};
    var per=(i.von&&i.bis)?(fmtDate(i.von)+" – "+fmtDate(i.bis)):(i.bis?("bis "+fmtDate(i.bis)):fmtDate(i.date));
    /* Delta gegenüber der zeitlich vorherigen Rechnung */
    var prev=null;var pos=invs.indexOf(i);if(pos>0)prev=invs[pos-1];
    var delta="";
    if(i.betrag!=null&&prev&&prev.betrag!=null){
      var d=i.betrag-prev.betrag;
      var cls=d>0.005?"up":(d<-0.005?"down":"same");
      var arrow=d>0.005?"▲":(d<-0.005?"▼":"■");
      delta='<span class="invdelta '+cls+'">'+arrow+" "+fmtEur(Math.abs(d))+'</span>';
    }
    return '<div class="invrow"><div class="invp"><div class="invper">'+escapeHtml(per)+'</div><div class="invd">'+escapeHtml(i.doc.filename||"Rechnung")+'</div></div>'+
      '<div class="invb">'+(i.betrag!=null?fmtEur(i.betrag):"–")+delta+'</div>'+
      '<button class="ghost" data-action="doc-view" data-id="'+i.doc.id+'" style="flex:none;font-size:.8rem;padding:6px 10px">👁️</button></div>';
  }).join("");
  var head=withBetrag.length?('<p class="muted" style="font-size:.85rem;margin:0 0 6px">'+withBetrag.length+' Rechnungen'+(avg!=null?' · ⌀ '+fmtEur(avg):"")+' · gesamt '+fmtEur(sum)+'</p>'):"";
  return '<section class="card"><h2 class="sect">🧾 Monatsrechnungen</h2>'+head+mini+rows+'</section>';
}

/* ---- Hinzufügen (Upload + Review) ---- */
function viewAdd(){
  if(importResults.length&&!importBusy)return importSummaryCard();
  var review="";
  if(reviewDoc){
    var ext=reviewDoc.extracted||null;
    if(ext&&isMed(reviewDoc)){
      review=medReviewCard(reviewDoc,ext);
    }else if(ext){
      var t=dtInfo(reviewDoc.doc_type),k=ext.kategorie?katInfo(ext.kategorie):null;
      var wichtig=(ext.wichtig&&ext.wichtig.length)?'<ul class="wichtig">'+ext.wichtig.map(function(w){return '<li>'+escapeHtml(w)+'</li>';}).join("")+'</ul>':"";
      var match=findMatch(ext);
      var smart=[],extraBtns="";
      /* Duplikat-Erkennung */
      var dup=DOCS.find(function(d){
        if(d.id===reviewDoc.id)return false;
        var dx=d.extracted;
        if(dx&&ext.vertragsnummer&&dx.vertragsnummer===ext.vertragsnummer&&ext.datum&&dx.datum===ext.datum&&dx.docType===ext.docType)return true;
        if(d.filename===reviewDoc.filename&&d.size_bytes===reviewDoc.size_bytes)return true;
        return false;
      });
      if(dup)smart.push('⚠️ Ein sehr ähnliches Dokument liegt schon im Archiv („'+escapeHtml(dup.filename||"?")+'“ vom '+fmtDate(dup.doc_date||String(dup.created_at).slice(0,10))+') – möglicherweise doppelt hochgeladen.');
      /* Personen-Erkennung */
      if(reviewDoc.person_id){
        smart.push('👤 Zugeordnet zu '+personBadge(reviewDoc.person_id)+'.');
      }else if(ext.vertragspartner){
        var pmatch=matchPerson(ext.vertragspartner);
        if(pmatch){
          smart.push('👤 Vertragspartner „'+escapeHtml(ext.vertragspartner)+'“ → passt zu '+personBadge(pmatch.id)+'.');
          extraBtns+='<button class="ghost" data-action="review-setperson" data-id="'+pmatch.id+'">👤 '+escapeHtml(pmatch.name)+' zuordnen</button>';
        }else{
          smart.push('👤 Der Butler erkennt als Vertragspartner: <b>'+escapeHtml(ext.vertragspartner)+'</b>. Als eigene Person führen?');
          extraBtns+='<button class="ghost" data-action="review-createperson" data-name="'+escapeHtml(ext.vertragspartner)+'">👤 Person „'+escapeHtml(ext.vertragspartner)+'“ anlegen</button>';
        }
      }
      if(match){
        /* Kündigung erkannt → Status-Aktion anbieten */
        if(ext.docType==="kuendigung"&&match.status==="aktiv"){
          smart.push('✂️ Das sieht nach einer Kündigung bzw. Kündigungsbestätigung für diesen Vertrag aus.');
          extraBtns+='<button class="primary" data-action="review-cancel" data-id="'+match.id+'">✂️ „'+escapeHtml(match.anbieter||"Vertrag")+'“ als gekündigt markieren</button>';
        }
        /* Preisänderung erkannt → Übernahme anbieten */
        if(ext.docType!=="rechnung"&&ext.kosten!=null&&match.kosten!=null&&Math.abs(ext.kosten-match.kosten)>=0.01&&(!ext.kostenIntervall||ext.kostenIntervall===match.kosten_intervall)){
          var dir=ext.kosten>match.kosten?"steigt":"sinkt";
          smart.push('💶 Der Preis '+dir+': bisher '+fmtEur(match.kosten)+', laut Dokument '+fmtEur(ext.kosten)+' ('+(INTERVALL_LABEL[match.kosten_intervall]||"")+').');
          if(ext.kosten>match.kosten)smart.push('⚖️ Bei einer Preiserhöhung hast du oft ein <b>Sonderkündigungsrecht</b> – meist bis zum Wirksamwerden der Erhöhung.');
          extraBtns+='<button class="ghost" data-action="review-price" data-id="'+match.id+'" data-price="'+ext.kosten+'" data-iv="'+escapeHtml(ext.kostenIntervall||"")+'">💶 Preis auf '+fmtEur(ext.kosten)+' aktualisieren</button>';
        }
        /* Rechnungsbetrag gegen vereinbarten Preis prüfen */
        if(ext.docType==="rechnung"&&ext.betrag!=null&&match.kosten!=null){
          var diff=ext.betrag-match.kosten;
          if(Math.abs(diff)<=Math.max(0.5,match.kosten*0.02))smart.push('✅ Rechnungsbetrag '+fmtEur(ext.betrag)+' passt zum vereinbarten Preis ('+fmtEur(match.kosten)+' '+(INTERVALL_LABEL[match.kosten_intervall]||"")+').');
          else smart.push('⚠️ Rechnungsbetrag '+fmtEur(ext.betrag)+' weicht um <b>'+fmtEur(diff)+'</b> vom vereinbarten Preis ab ('+fmtEur(match.kosten)+' '+(INTERVALL_LABEL[match.kosten_intervall]||"")+') – lohnt einen Blick.');
        }
        /* Dokument enthält Angaben, die dem Vertrag fehlen */
        var fills=missingFills(match,ext);
        if(fills.length){
          smart.push('🧩 Das Dokument enthält Angaben, die deinem Vertrag noch fehlen: '+fills.map(function(f){return f.label;}).join(", ")+'.');
          extraBtns+='<button class="ghost" data-action="review-complete" data-id="'+match.id+'">🧩 Fehlende Daten übernehmen</button>';
        }
      }
      var actions='<div class="btnrow">'+extraBtns;
      if(match)actions+='<button class="'+(extraBtns?"ghost":"primary")+'" data-action="review-link" data-id="'+match.id+'">🔗 Zu „'+escapeHtml(match.anbieter||"Vertrag")+'“ zuordnen</button>';
      actions+='<button class="'+(match?"ghost":"primary")+'" data-action="review-new">📑 Neuen Vertrag anlegen</button>';
      actions+='<button class="ghost" data-action="review-done">Nur im Archiv ablegen</button></div>';
      review='<section class="card"><h2 class="sect">🎩 Das hat der Butler gelesen</h2>'+
        '<p><b>'+t.icon+' '+t.label+'</b>'+(k?' · '+k.icon+' '+k.label:"")+(ext.anbieter?' · '+escapeHtml(ext.anbieter):"")+'</p>'+
        (ext.zusammenfassung?'<p style="margin:8px 0">'+escapeHtml(ext.zusammenfassung)+'</p>':"")+
        wichtig+
        (ext.hinweise?'<div class="ainote">💡 '+escapeHtml(ext.hinweise)+'</div>':"")+
        (match?'<div class="ainote">🔍 Das passt vermutlich zu deinem bestehenden Vertrag <b>'+escapeHtml(match.anbieter||"?")+(match.produkt?" – "+escapeHtml(match.produkt):"")+'</b>.</div>':"")+
        smart.map(function(s){return '<div class="ainote">'+s+'</div>';}).join("")+
        actions+'</section>';
    }
  }
  var personHint=(activePerson&&personById(activePerson))?'<div class="ainote">👤 Neue Dokumente werden automatisch <b>'+escapeHtml(personById(activePerson).name)+'</b> zugeordnet (aktiver Personen-Filter).</div>':"";
  return review+

  '<p class="muted" style="margin-bottom:14px"><b>Einfach hochladen – der Butler sortiert automatisch ein.</b> Du kannst auch mehrere Dateien auf einmal wählen. Er erkennt selbst, worum es geht: Verträge werden angelegt bzw. zugeordnet und bei den Fristen überwacht, Arztrechnungen wandern in den 🩺 Gesundheitsbereich (mit Fachrichtung, Arzt, Betrag), alles Übrige ins Archiv – jeweils mit erkannter Kategorie und Person.</p>'+
  personHint+
  '<div class="upzone">'+

function authMsg(text,kind){var m=$("#auth_msg");if(!m)return;if(!text){m.hidden=true;m.textContent="";return;}m.hidden=false;m.textContent=text;m.className="authmsg "+(kind||"");}
function loginErrorText(e){var m=errMsg(e);if(/invalid login/i.test(m))return "E-Mail oder Passwort ist falsch.";if(/email not confirmed/i.test(m))return "Bitte bestätige zuerst deine E-Mail-Adresse (Link in der Bestätigungs-Mail).";if(/already registered|already been registered/i.test(m))return "Für diese E-Mail gibt es bereits ein Konto. Bitte melde dich an.";if(/rate limit|too many/i.test(m))return "Zu viele Versuche. Bitte kurz warten und erneut probieren.";return m;}

/* ---------- Native App (Capacitor) – nur aktiv in der Android-App ---------- */
var CAP=window.Capacitor;
function isNative(){try{return !!(CAP&&CAP.isNativePlatform&&CAP.isNativePlatform());}catch(e){return false;}}
function capPlugin(n){return (CAP&&CAP.Plugins&&CAP.Plugins[n])?CAP.Plugins[n]:null;}
function hashId(str,off){var h=5381;str=String(str||"");for(var i=0;i<str.length;i++){h=((h<<5)+h+str.charCodeAt(i))|0;}return (Math.abs(h)%1000000)+(off||0)*1000000+100000;}
function daysBeforeDate(iso,n){var d=new Date(String(iso).slice(0,10)+"T09:00:00");d.setDate(d.getDate()-n);return d;}
/* Kamera-Scan über die native Kamera (bessere Qualität als Browser-Upload) */
async function nativeCameraScan(){
  var Camera=capPlugin("Camera");
  if(!Camera){var fc=$("#fileCam");if(fc)fc.click();return;}
  try{
    var photo=await Camera.getPhoto({quality:82,allowEditing:false,resultType:"base64",source:"CAMERA",saveToGallery:false,correctOrientation:true});
    if(!photo||!photo.base64String)return;
    var fmt=(photo.format||"jpeg").toLowerCase();var mime="image/"+(fmt==="jpg"?"jpeg":fmt);
    var blob=new Blob([base64ToBytes(photo.base64String)],{type:mime});
    var file=new File([blob],"scan-"+Date.now()+"."+(fmt==="jpeg"?"jpg":fmt),{type:mime});
    onAddFile(file);
  }catch(e){var m=String(e&&(e.message||e));if(!/cancel/i.test(m))toast("Kamera-Scan nicht möglich: "+m,true);}
}
/* "An Butler teilen": aus anderer App geteilte Datei empfangen und einlesen */
var pendingSharedFile=null;
function shareExt(type){type=(type||"").toLowerCase();if(type.indexOf("pdf")>=0)return ".pdf";if(type.indexOf("png")>=0)return ".png";if(type.indexOf("jpeg")>=0||type.indexOf("jpg")>=0)return ".jpg";if(type.indexOf("rfc822")>=0||type.indexOf("eml")>=0)return ".eml";if(type.indexOf("image")>=0)return ".jpg";return "";}
async function handleSharedIntent(){
  var SI=capPlugin("SendIntent");if(!SI||!SI.checkSendIntentReceived)return;
  var res;try{res=await SI.checkSendIntentReceived();}catch(e){return;}
  if(!res||!res.url)return;
  try{
    var rawUrl=decodeURIComponent(res.url);
    var fetchUrl=(CAP&&CAP.convertFileSrc)?CAP.convertFileSrc(rawUrl):rawUrl;
    var resp=await fetch(fetchUrl);
    var blob=await resp.blob();
    var type=res.type||blob.type||"application/octet-stream";
    var base=(res.title||"geteilt").replace(/[^\wäöüÄÖÜß.\-]+/g,"_").slice(0,40)||"geteilt";
    var name=/\.[a-z0-9]{2,4}$/i.test(base)?base:base+shareExt(type);
    var file=new File([blob],name,{type:type});
    try{SI.finish&&SI.finish();}catch(e){}
    if(currentUser&&activeHousehold){go("add");onAddFile(file);}
    else{pendingSharedFile=file;}
  }catch(e){toast("Geteilte Datei konnte nicht gelesen werden: "+errMsg(e),true);}
}
/* Lokale Erinnerungen 30 und 7 Tage vor dem letzten Kündigungstag planen */
async function scheduleFristNotifications(){
  if(!isNative())return;
  var LN=capPlugin("LocalNotifications");if(!LN)return;
  try{

/* ---------- App-Sperre (PIN + Biometrie) – nur native App ---------- */
var PIN_LEN=4;
var lockMode="verify",lockBuf="",lockFirst="";
function pinStored(){try{return JSON.parse(localStorage.getItem("db_pin")||"null");}catch(e){return null;}}
function pinSet(){return !!pinStored();}
function bioEnabled(){try{return localStorage.getItem("db_bio")==="1";}catch(e){return false;}}
async function sha256hex(s){
  try{var buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(s));return Array.prototype.map.call(new Uint8Array(buf),function(b){return b.toString(16).padStart(2,"0");}).join("");}
  catch(e){var h=0;for(var i=0;i<s.length;i++){h=(h*31+s.charCodeAt(i))>>>0;}return "f"+h.toString(16);}
}
async function savePin(pin){var salt=Math.random().toString(36).slice(2)+Date.now();localStorage.setItem("db_pin",JSON.stringify({salt:salt,hash:await sha256hex(salt+"|"+pin)}));}
async function checkPinVal(pin){var st=pinStored();if(!st)return false;return (await sha256hex(st.salt+"|"+pin))===st.hash;}
function removePin(){try{localStorage.removeItem("db_pin");localStorage.removeItem("db_bio");}catch(e){}}
function lockRenderDots(){var el=$("#lockDots");if(!el)return;var h="";for(var i=0;i<PIN_LEN;i++)h+='<span class="lockdot'+(i<lockBuf.length?" on":"")+'"></span>';el.innerHTML=h;el.classList.remove("err");}
function lockBuildKeypad(){
  var el=$("#lockKeypad");if(!el)return;
  var h=["1","2","3","4","5","6","7","8","9"].map(function(k){return '<button class="keybtn" data-key="'+k+'">'+k+'</button>';}).join("");
  h+='<button class="keybtn wide" data-key="C">'+(lockMode==="verify"?"":"Abbr.")+'</button>';
  h+='<button class="keybtn" data-key="0">0</button>';
  h+='<button class="keybtn wide" data-key="B">⌫</button>';
  el.innerHTML=h;
}
function showLock(mode){
  lockMode=mode||"verify";lockBuf="";lockFirst="";
  var ls=$("#lockscreen");if(ls)ls.hidden=false;
  $("#lockTitle").textContent=lockMode==="verify"?"App entsperren":(lockMode==="set"?"Neue PIN festlegen":"PIN bestätigen");
  $("#lockSub").textContent=lockMode==="verify"?"Bitte gib deine PIN ein.":(lockMode==="set"?"Wähle eine 4-stellige PIN.":"Gib die PIN erneut ein.");
  lockBuildKeypad();lockRenderDots();
  var bio=$("#lockBioBtn");if(bio)bio.hidden=!(lockMode==="verify"&&bioEnabled());
  if(lockMode==="verify"&&bioEnabled())tryBiometric();
}
function hideLock(){var ls=$("#lockscreen");if(ls)ls.hidden=true;}
function lockError(msg){var d=$("#lockDots");if(d)d.classList.add("err");var s=$("#lockSub");if(s)s.textContent=msg;lockBuf="";setTimeout(lockRenderDots,340);}
async function lockKey(k){
  if(k==="B"){lockBuf=lockBuf.slice(0,-1);lockRenderDots();return;}
  if(k==="C"){if(lockMode!=="verify")hideLock();return;}
  if(lockBuf.length>=PIN_LEN)return;
  lockBuf+=k;lockRenderDots();
  if(lockBuf.length<PIN_LEN)return;
  var entered=lockBuf;
  if(lockMode==="verify"){
    if(await checkPinVal(entered))hideLock();else lockError("Falsche PIN. Bitte erneut.");
  }else if(lockMode==="set"){
    lockFirst=entered;lockBuf="";lockMode="confirm";$("#lockTitle").textContent="PIN bestätigen";$("#lockSub").textContent="Gib die PIN erneut ein.";lockRenderDots();
  }else{
    if(entered===lockFirst){await savePin(entered);hideLock();toast("PIN gespeichert 🔒");if(activeView==="settings")renderApp();maybeOfferBiometric();}
    else{lockMode="set";lockFirst="";lockError("PINs stimmen nicht überein.");}
  }
}
function bioPlugin(){return capPlugin("BiometricAuth")||capPlugin("NativeBiometric");}
async function bioAvailable(){
  var B=bioPlugin();if(!B)return false;
  try{
    if(B.checkBiometry){var r=await B.checkBiometry();return !!(r&&(r.isAvailable||r.biometryType));}
    if(B.isAvailable){var r2=await B.isAvailable();return !!(r2&&r2.isAvailable);}
  }catch(e){}
  return false;
}
async function tryBiometric(){
  var B=bioPlugin();if(!B)return;
  try{
    if(B.authenticate){await B.authenticate({reason:"Dokumenten-Butler entsperren",cancelTitle:"PIN verwenden",androidTitle:"Entsperren",androidSubtitle:"Fingerabdruck oder Gesicht"});hideLock();return;}
    if(B.verifyIdentity){await B.verifyIdentity({reason:"Dokumenten-Butler entsperren",title:"Entsperren"});hideLock();return;}
  }catch(e){}
}

/* ---------- Google Drive verbinden (läuft im Browser/Laptop) ---------- */
var GDRIVE_SCOPE="https://www.googleapis.com/auth/drive.readonly";
var gdriveToken=null,gdriveTokenClient=null;
function gdriveClientId(){try{return localStorage.getItem("db_gdrive_client")||"";}catch(e){return "";}}
function gdriveFolderId(){try{return localStorage.getItem("db_gdrive_folder")||"";}catch(e){return "";}}
function gdriveImportedSet(){try{return JSON.parse(localStorage.getItem("db_gdrive_imported")||"[]");}catch(e){return [];}}
function addGdriveImported(ids){try{var s=gdriveImportedSet();ids.forEach(function(id){if(s.indexOf(id)<0)s.push(id);});localStorage.setItem("db_gdrive_imported",JSON.stringify(s.slice(-3000)));}catch(e){}}
function extractFolderId(v){v=(v||"").trim();var m=v.match(/[-\w]{25,}/);return m?m[0]:v;}
function loadGIS(){
  return new Promise(function(res,rej){
    if(window.google&&google.accounts&&google.accounts.oauth2)return res();
    var s=document.createElement("script");s.src="https://accounts.google.com/gsi/client";s.async=true;s.defer=true;
    s.onload=function(){res();};s.onerror=function(){rej(new Error("Google-Anmeldedienst konnte nicht geladen werden."));};
    document.head.appendChild(s);
  });
}
function gdriveGetToken(){
  return new Promise(function(res,rej){
    var cid=gdriveClientId();if(!cid)return rej(new Error("Bitte zuerst die Google Client-ID eintragen."));
    loadGIS().then(function(){
      try{
        gdriveTokenClient=google.accounts.oauth2.initTokenClient({client_id:cid,scope:GDRIVE_SCOPE,callback:function(resp){
          if(resp&&resp.access_token){gdriveToken=resp.access_token;res(resp.access_token);}
          else rej(new Error("Keine Google-Freigabe erhalten."));
        }});
        gdriveTokenClient.requestAccessToken({prompt:gdriveToken?"":"consent"});
      }catch(e){rej(e);}
    }).catch(rej);
  });
}
function saveGdriveConfig(){
  var c=$("#gd_client"),f=$("#gd_folder");
  try{
    if(c)localStorage.setItem("db_gdrive_client",(c.value||"").trim());
    if(f)localStorage.setItem("db_gdrive_folder",extractFolderId(f.value));
  }catch(e){}
  gdriveToken=null;
  toast("Google-Drive-Einstellungen gespeichert ✅");
  if(activeView==="settings")renderApp();
}
async function gdriveImport(){
  var folder=gdriveFolderId();if(!folder){toast("Bitte zuerst den Drive-Ordner eintragen und speichern.",true);return;}
  if(!gdriveClientId()){toast("Bitte zuerst die Google Client-ID eintragen und speichern.",true);return;}
  toast("Verbinde mit Google Drive …");
  var token;try{token=gdriveToken||await gdriveGetToken();}catch(e){toast("Google-Verbindung fehlgeschlagen: "+errMsg(e),true);return;}
  var q="'"+folder+"' in parents and trashed=false and (mimeType='application/pdf' or mimeType contains 'image/')";
  var url="https://www.googleapis.com/drive/v3/files?q="+encodeURIComponent(q)+"&fields=files(id,name,mimeType)&pageSize=200";
  var list;
  try{var r=await fetch(url,{headers:{Authorization:"Bearer "+token}});if(!r.ok)throw new Error("Drive-Abfrage "+r.status);list=await r.json();}
  catch(e){toast("Drive-Ordner konnte nicht gelesen werden: "+errMsg(e),true);return;}
  var files=list.files||[];
  if(!files.length){toast("Im Ordner wurden keine PDFs oder Bilder gefunden.",true);return;}
  var imported=gdriveImportedSet();
  var neu=files.filter(function(f){return imported.indexOf(f.id)<0;});
  if(!neu.length){toast("Alle "+files.length+" Dateien aus dem Ordner sind bereits importiert.");return;}
  toast(neu.length+" neue Datei(en) werden aus Drive geholt …");
  var toImport=[],okIds=[];
  for(var i=0;i<neu.length;i++){
    try{
      var dr=await fetch("https://www.googleapis.com/drive/v3/files/"+neu[i].id+"?alt=media",{headers:{Authorization:"Bearer "+token}});
      if(!dr.ok)continue;
      var blob=await dr.blob();
      toImport.push(new File([blob],neu[i].name||("drive-"+neu[i].id),{type:neu[i].mimeType||blob.type}));
      okIds.push(neu[i].id);
    }catch(e){}
  }
  if(!toImport.length){toast("Die Dateien konnten nicht geladen werden.",true);return;}
  addGdriveImported(okIds);
  processFiles(toImport);
}

      {linkDoc(docId,sug.id);return;}

  var list=CONTRACTS.map(function(c,i){return (i+1)+" = "+(c.anbieter||"?")+(c.produkt?" ("+c.produkt+")":"");}).join("\n");
