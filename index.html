<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
<meta name="theme-color" content="#1d4ed8">
<title>Dokumenten-Butler</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
<link rel="manifest" href="manifest.webmanifest">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<style>
/* ===== Dokumenten-Butler — Clean / Minimal (Inter, Sidebar-Dashboard) ===== */
*{box-sizing:border-box}
[hidden]{display:none!important}
:root{
 --bg:#fafafa;--panel:#ffffff;--panel2:#f4f4f5;
 --fg:#09090b;--muted:#71717a;--muted2:#a1a1aa;
 --border:#e7e7ea;--border2:#d4d4d8;
 --accent:#1d4ed8;--accent-fg:#ffffff;--gold:#b45309;
 --pos:#16a34a;--warn:#d97706;--neg:#dc2626;
 --radius:12px;--radius-sm:8px;
 --shadow-sm:0 1px 2px rgba(9,9,11,.05);
 --shadow:0 1px 3px rgba(9,9,11,.09),0 1px 2px rgba(9,9,11,.04);
 --shadow-lg:0 12px 34px -14px rgba(9,9,11,.30);
 --sidebar-w:248px;
}
body.dark{
 --bg:#09090b;--panel:#131316;--panel2:#1d1d20;
 --fg:#fafafa;--muted:#a1a1aa;--muted2:#71717a;
 --border:#27272a;--border2:#3f3f46;
 --accent:#60a5fa;--gold:#fbbf24;
 --shadow-sm:0 1px 2px rgba(0,0,0,.4);
 --shadow:0 1px 3px rgba(0,0,0,.5);
 --shadow-lg:0 14px 36px -14px rgba(0,0,0,.7);
}
html{-webkit-text-size-adjust:100%}
body{margin:0;font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--fg);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
h1,h2,h3{margin:0;font-weight:650;letter-spacing:-.012em}
a{color:var(--accent);text-decoration:none}
::selection{background:color-mix(in srgb,var(--accent) 26%,transparent)}
.muted{color:var(--muted)}.pos{color:var(--pos)}.neg{color:var(--neg)}

/* ---- Shell ---- */
.shell{display:grid;grid-template-columns:var(--sidebar-w) 1fr;min-height:100vh}
.sidebar{position:sticky;top:0;height:100vh;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:18px 14px;gap:4px;overflow-y:auto}
.brand{display:flex;align-items:center;gap:11px;padding:4px 8px 18px;font-weight:700;font-size:1.05rem;letter-spacing:-.02em}
.blogo{width:32px;height:32px;border-radius:9px;background:linear-gradient(140deg,var(--accent),color-mix(in srgb,var(--accent) 45%,#000));display:grid;place-items:center;color:#fff;flex:none;font-size:1.05rem}
.nav{display:flex;flex-direction:column;gap:2px}
.tab{display:flex;align-items:center;gap:11px;padding:9px 10px;border-radius:8px;border:none;background:none;color:var(--muted);font:inherit;font-weight:500;font-size:.92rem;cursor:pointer;text-align:left;width:100%;transition:background .12s,color .12s}
.tab .tcon{width:18px;height:18px;flex:none;display:grid;place-items:center;font-size:1rem}
.tab:hover{background:var(--panel2);color:var(--fg)}
.tab.active{background:color-mix(in srgb,var(--accent) 13%,transparent);color:var(--accent);font-weight:600}
.sidebar-foot{margin-top:auto;display:flex;flex-direction:column;gap:2px;padding-top:12px;border-top:1px solid var(--border)}
.content{min-width:0;display:flex;flex-direction:column}
.topbar2{height:58px;flex:none;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:0 24px;border-bottom:1px solid var(--border);position:sticky;top:0;background:color-mix(in srgb,var(--bg) 80%,transparent);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);z-index:20}
.pagetitle{font-size:1.02rem;font-weight:650;letter-spacing:-.01em;display:flex;align-items:center;gap:9px}
.topactions{display:flex;align-items:center;gap:10px}
main{padding:26px 24px 90px;width:100%;max-width:1060px;margin:0 auto}
.iconchip{display:inline-flex;align-items:center;justify-content:center;gap:7px;height:36px;min-width:36px;padding:0 11px;border:1px solid var(--border);border-radius:8px;background:var(--panel);color:var(--fg);cursor:pointer;font:inherit;font-weight:500;font-size:.85rem}
.iconchip:hover{background:var(--panel2)}
.bottomnav{display:none}

/* ---- Cards ---- */
.card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin:0 0 16px;box-shadow:var(--shadow-sm)}
.sect{font-size:1rem;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:760px){.grid2{grid-template-columns:1fr}}

/* ---- Buttons / Forms ---- */
button.primary{background:var(--accent);color:var(--accent-fg);border:none;border-radius:9px;padding:11px 18px;font:inherit;font-weight:600;cursor:pointer;box-shadow:var(--shadow-sm)}
button.primary:hover{filter:brightness(1.07)}
button.ghost{background:var(--panel);border:1px solid var(--border);border-radius:9px;padding:10px 16px;font:inherit;font-weight:500;color:var(--fg);cursor:pointer}
button.ghost:hover{background:var(--panel2)}
button.danger{background:none;border:1px solid color-mix(in srgb,var(--neg) 40%,transparent);color:var(--neg);border-radius:9px;padding:9px 14px;font:inherit;font-weight:500;cursor:pointer}
.linkbtn{background:none;border:none;color:var(--accent);font:inherit;font-weight:500;cursor:pointer;padding:0;display:block}
label.f{display:block;font-size:.83rem;font-weight:600;color:var(--muted);margin:12px 0 4px}
input[type=text],input[type=number],input[type=date],input[type=email],input[type=password],select,textarea{width:100%;padding:10px 12px;border:1px solid var(--border2);border-radius:9px;background:var(--panel);color:var(--fg);font:inherit;font-size:.95rem}
input:focus,select:focus,textarea:focus{outline:2px solid color-mix(in srgb,var(--accent) 45%,transparent);outline-offset:1px;border-color:var(--accent)}
textarea{min-height:74px;resize:vertical}
.formrow{display:grid;grid-template-columns:1fr 1fr;gap:0 14px}
@media(max-width:560px){.formrow{grid-template-columns:1fr}}
.btnrow{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}

/* ---- Dashboard ---- */
.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
@media(max-width:680px){.kpis{grid-template-columns:1fr 1fr}}
.kpi{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px}
.kpi .klabel{font-size:.78rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.kpi .kval{font-size:1.5rem;font-weight:700;letter-spacing:-.02em;margin-top:2px}
.kpi .ksub{font-size:.8rem;color:var(--muted2)}
.bigadd{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:16px;border:2px dashed var(--border2);border-radius:var(--radius);background:none;color:var(--muted);font:inherit;font-weight:600;font-size:1rem;cursor:pointer;margin-bottom:16px}
.bigadd:hover{border-color:var(--accent);color:var(--accent);background:color-mix(in srgb,var(--accent) 5%,transparent)}

/* ---- Fristen / Ampel ---- */
.frow{display:flex;align-items:center;gap:12px;padding:12px 4px;border-bottom:1px solid var(--border)}
.frow:last-child{border-bottom:none}
.dot{width:12px;height:12px;border-radius:50%;flex:none}
.dot.red{background:var(--neg);box-shadow:0 0 0 4px color-mix(in srgb,var(--neg) 18%,transparent)}
.dot.amber{background:var(--warn);box-shadow:0 0 0 4px color-mix(in srgb,var(--warn) 18%,transparent)}
.dot.green{background:var(--pos)}
.dot.gray{background:var(--muted2)}
.fmain{flex:1;min-width:0;cursor:pointer}
.ftitle{font-weight:600;font-size:.95rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fsub{font-size:.83rem;color:var(--muted)}
.fsub b{color:var(--fg)}
.fact{display:flex;gap:6px;flex:none}

/* ---- Verträge ---- */
.clist{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:760px){.clist{grid-template-columns:1fr}}
.ccard{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer;box-shadow:var(--shadow-sm);transition:border-color .12s}
.ccard:hover{border-color:var(--accent)}
.chead{display:flex;align-items:center;gap:10px}
.cicon{width:38px;height:38px;border-radius:10px;background:var(--panel2);display:grid;place-items:center;font-size:1.15rem;flex:none}
.cname{font-weight:650;font-size:.97rem;line-height:1.25}
.csub{font-size:.8rem;color:var(--muted)}
.cmeta{display:flex;justify-content:space-between;align-items:center;margin-top:12px;font-size:.85rem}
.ccost{font-weight:650}
.badge{display:inline-flex;align-items:center;gap:5px;padding:2px 9px;border-radius:99px;font-size:.75rem;font-weight:600}
.badge.red{background:color-mix(in srgb,var(--neg) 13%,transparent);color:var(--neg)}
.badge.amber{background:color-mix(in srgb,var(--warn) 14%,transparent);color:var(--warn)}
.badge.green{background:color-mix(in srgb,var(--pos) 12%,transparent);color:var(--pos)}
.badge.gray{background:var(--panel2);color:var(--muted)}
.badge.law{background:color-mix(in srgb,var(--accent) 11%,transparent);color:var(--accent)}
.dgrid{display:grid;grid-template-columns:auto 1fr;gap:6px 18px;font-size:.92rem;margin:10px 0}
.dgrid .dk{color:var(--muted);white-space:nowrap}
.dgrid .dv{font-weight:550;overflow-wrap:anywhere}

/* ---- Dokumente ---- */
.docrow{display:flex;gap:12px;padding:13px 4px;border-bottom:1px solid var(--border);align-items:flex-start}
.docrow:last-child{border-bottom:none}
.dicon{width:36px;height:36px;border-radius:9px;background:var(--panel2);display:grid;place-items:center;font-size:1.05rem;flex:none;margin-top:2px}
.dbody{flex:1;min-width:0}
.dname{font-weight:600;font-size:.92rem;overflow-wrap:anywhere}
.dsum{font-size:.85rem;color:var(--muted);margin-top:2px}
.dmeta{font-size:.78rem;color:var(--muted2);margin-top:3px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.dact{display:flex;flex-direction:column;gap:6px;flex:none}
.dact button{font-size:.8rem;padding:6px 10px}
.filterbar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.filterbar select,.filterbar input{width:auto;flex:1;min-width:130px}

/* ---- Upload / KI ---- */
.upzone{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:560px){.upzone{grid-template-columns:1fr}}
.upbtn{display:flex;flex-direction:column;align-items:center;gap:8px;padding:26px 14px;border:2px dashed var(--border2);border-radius:var(--radius);background:none;color:var(--fg);font:inherit;font-weight:600;cursor:pointer}
.upbtn:hover{border-color:var(--accent);color:var(--accent);background:color-mix(in srgb,var(--accent) 5%,transparent)}
.upbtn .uic{font-size:1.9rem}
.upbtn .usub{font-size:.8rem;font-weight:400;color:var(--muted)}
.aiwork{display:flex;align-items:center;gap:12px;padding:14px}
.spin{width:22px;height:22px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:sp 0.9s linear infinite;flex:none}
@keyframes sp{to{transform:rotate(360deg)}}
.ainote{background:color-mix(in srgb,var(--accent) 7%,transparent);border:1px solid color-mix(in srgb,var(--accent) 25%,transparent);border-radius:var(--radius-sm);padding:12px 14px;font-size:.9rem;margin:12px 0}
.wichtig{margin:8px 0 0;padding-left:20px;font-size:.9rem}
.wichtig li{margin:3px 0}

/* ---- Einstellungen / Haushalt ---- */
.acclabel{font-size:.82rem;font-weight:650;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:4px 0 8px}
.accsep{margin-top:26px;padding-top:18px;border-top:1px solid var(--border)}
.hhlist{display:flex;flex-direction:column;gap:8px}
.hhopt{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;border:1px solid var(--border);border-radius:9px;background:var(--panel);font:inherit;cursor:pointer;color:var(--fg)}
.hhopt.active{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 7%,transparent)}
.hhopt .hhname{font-weight:600}
.hhopt .hhtag{font-size:.8rem;color:var(--muted)}
.hhopt.active .hhtag{color:var(--accent);font-weight:600}
.hhadd{display:flex;gap:8px}
.hhadd input{flex:1}
.inviteout{margin-top:10px;padding:12px;border:1px dashed var(--border2);border-radius:9px;font-size:.9rem}
.invcode{font-size:1.15rem;letter-spacing:.08em}
.invcopy{margin-left:10px;font-size:.8rem;padding:4px 10px;border:1px solid var(--border);border-radius:7px;background:var(--panel);cursor:pointer;color:var(--fg)}
.invhint{color:var(--muted);font-size:.82rem;margin:8px 0 0}

/* ---- Auth ---- */
.authscreen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:100;padding:20px}
.authscreen[hidden]{display:none}
.authcard{width:100%;max-width:400px;background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:30px 28px;box-shadow:var(--shadow-lg)}
.authlogo{width:52px;height:52px;border-radius:14px;background:linear-gradient(140deg,#1d4ed8,#172554);display:grid;place-items:center;font-size:1.6rem;margin:0 auto 14px}
.authcard h1{text-align:center;font-size:1.25rem}
.authsub{text-align:center;color:var(--muted);font-size:.88rem;margin:6px 0 18px}
.authmsg{padding:10px 12px;border-radius:9px;font-size:.87rem;margin-bottom:12px;background:var(--panel2)}
.authmsg.err{background:color-mix(in srgb,var(--neg) 10%,transparent);color:var(--neg)}
.authmsg.ok{background:color-mix(in srgb,var(--pos) 10%,transparent);color:var(--pos)}
.authcard label{display:block;font-size:.83rem;font-weight:600;color:var(--muted);margin:12px 0 4px}
.authbtns{display:flex;flex-direction:column;gap:9px;margin-top:18px}
.authforgot{text-align:center;margin-top:14px;font-size:.85rem}
body.app-hidden .shell{display:none}

/* ---- Toast ---- */
#toast{position:fixed;left:50%;bottom:26px;transform:translate(-50%,20px);background:#26262b;color:#fff;padding:13px 20px;border-radius:10px;font-size:.9rem;font-weight:500;opacity:0;pointer-events:none;transition:all .22s;z-index:200;box-shadow:var(--shadow-lg);max-width:min(480px,90vw);min-height:24px}
#toast.show{opacity:1;transform:translate(-50%,0)}
#toast.err{background:#b3261e}

/* ---- Mobile ---- */
@media(max-width:900px){
 .shell{grid-template-columns:1fr}
 .sidebar{display:none}
 main{padding:18px 14px 96px}
 .bottomnav{display:flex;position:fixed;left:0;right:0;bottom:0;background:var(--panel);border-top:1px solid var(--border);z-index:30;padding:4px 6px calc(4px + env(safe-area-inset-bottom))}
 .bottomnav .tab{flex-direction:column;gap:2px;font-size:.68rem;padding:7px 2px;align-items:center;text-align:center;border-radius:10px}
 .bottomnav .tab .tcon{font-size:1.25rem;width:auto;height:auto}
}
@media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}
</style>
</head>

    </div>
  </div>
</div>

<div class="shell">
  <aside class="sidebar">
    <div class="brand"><span class="blogo">🎩</span> Butler</div>

  </div>
</div>
<nav class="bottomnav" id="tabsMobile"></nav>

function errMsg(e){if(!e)return "Unbekannter Fehler";if(typeof e==="string")return e;return e.message||e.error_description||e.msg||JSON.stringify(e);}
function fmtEur(n){if(n==null||isNaN(n))return "–";return Number(n).toLocaleString("de-DE",{style:"currency",currency:"EUR"});}
function fmtDate(iso){if(!iso)return "–";var p=String(iso).slice(0,10).split("-");if(p.length<3)return iso;return p[2]+"."+p[1]+"."+p[0];}
function todayISO(){var d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function addMonthsISO(iso,months){
  var p=String(iso).slice(0,10).split("-").map(Number);
  var whole=Math.trunc(months),days=Math.round((months-whole)*30);
  var d=new Date(Date.UTC(p[0],p[1]-1+whole,p[2]));

function daysUntil(iso){

/* ---------- Fristenlogik ----------
   Liefert {kind, level, end, lastDay, days, label, sub, neuesRecht}
   kind: fest | flex | unbekannt | gekuendigt | beendet */
function fristInfo(c){
  if(c.status==="beendet")return {kind:"beendet",level:"gray",label:"Beendet",sub:""};
  if(c.status==="gekuendigt")return {kind:"gekuendigt",level:"gray",label:"Gekündigt"+(c.gekuendigt_zum?" zum "+fmtDate(c.gekuendigt_zum):""),sub:""};
  var ml=c.mindestlaufzeit_monate,kf=c.kuendigungsfrist_monate,vl=c.verlaengerung_monate;
  var neu=!!(c.vertragsstart&&c.vertragsstart>=NEUES_RECHT_AB);
  if(ml===0||(ml==null&&vl===1)){
    var f=(kf==null?1:kf);
    return {kind:"flex",level:"green",label:"Jederzeit kündbar",sub:"Kündigungsfrist "+fristTxt(f),neuesRecht:false};
  }
  if(!c.vertragsstart||ml==null){
    return {kind:"unbekannt",level:"gray",label:"Fristen unbekannt",sub:"Vertragsbeginn/Laufzeit ergänzen, dann rechnet der Butler.",neuesRecht:false};
  }
  if(kf==null)kf=1;
  var initialEnd=addMonthsISO(c.vertragsstart,ml);
  var lastDay=addMonthsISO(initialEnd,-kf);
  var today=todayISO();
  if(today<=lastDay){
    var days=daysUntil(lastDay);
    return {kind:"fest",level:ampel(days),end:initialEnd,lastDay:lastDay,days:days,
      label:"Kündbar zum "+fmtDate(initialEnd),
      sub:"Letzter Kündigungstag: "+fmtDate(lastDay)+" (in "+days+" Tagen)",neuesRecht:false};
  }
  /* Erstlaufzeit(-Fenster) vorbei → Verlängerungsphase */
  var effVl=neu?1:(vl==null?12:vl);
  var effKf=neu?Math.min(kf,1):kf;
  if(effVl<=1){
    return {kind:"flex",level:"green",label:"Jederzeit kündbar",sub:"Kündigungsfrist "+fristTxt(effKf)+(neu?" · nach neuem Recht (ab 3/2022) monatlich kündbar":""),neuesRecht:neu};
  }
  var end=initialEnd,guard=0;
  while(addMonthsISO(end,-effKf)<today&&guard<600){end=addMonthsISO(end,effVl);guard++;}
  var ld=addMonthsISO(end,-effKf),dy=daysUntil(ld);
  return {kind:"fest",level:ampel(dy),end:end,lastDay:ld,days:dy,
    label:"Kündbar zum "+fmtDate(end),
    sub:"Letzter Kündigungstag: "+fmtDate(ld)+" (in "+dy+" Tagen) · Altvertrag: verlängert sich um "+effVl+" Monate",neuesRecht:false};
}
function ampel(days){return days<=30?"red":(days<=90?"amber":"green");}
function fristTxt(m){if(m==null)return "unbekannt";if(m===0.5)return "2 Wochen";if(m===1)return "1 Monat";if(m<1)return Math.round(m*30)+" Tage";return m+" Monate";}
function monatskosten(c){
  if(c.kosten==null||c.status!=="aktiv")return 0;
  var m=INTERVALL[c.kosten_intervall];
  if(!m)return 0; /* einmalig/unbekannt zählt nicht laufend */
  return Number(c.kosten)/m;
}

/* ---------- .ics Kalender-Export ---------- */
function icsDownload(c){
  var f=fristInfo(c);if(!f.lastDay){toast("Für diesen Vertrag ist keine Frist berechenbar.",true);return;}
  var name=(c.anbieter||"Vertrag")+(c.produkt?" – "+c.produkt:"");
  var dt=f.lastDay.replace(/-/g,"");
  var stamp=new Date().toISOString().replace(/[-:]/g,"").slice(0,15)+"Z";
  var uid="butler-"+c.id+"-"+dt+"@dokumenten-butler";
  var desc="Letzter Kündigungstag für "+name+". Vertrag läuft sonst weiter bis "+fmtDate(f.end)+"."+(c.kundennummer?" Kundennummer: "+c.kundennummer+".":"");
  var lines=["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//Dokumenten-Butler//DE","BEGIN:VEVENT",
    "UID:"+uid,"DTSTAMP:"+stamp,"DTSTART;VALUE=DATE:"+dt,
    "SUMMARY:"+icsEsc("⏰ Kündigungsfrist: "+name),
    "DESCRIPTION:"+icsEsc(desc),
    "BEGIN:VALARM","TRIGGER:-P14D","ACTION:DISPLAY","DESCRIPTION:"+icsEsc("In 14 Tagen: Kündigungsfrist "+name),"END:VALARM",
    "END:VEVENT","END:VCALENDAR"];
  var blob=new Blob([lines.join("\r\n")],{type:"text/calendar;charset=utf-8"});
  var a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download="kuendigungsfrist-"+(c.anbieter||"vertrag").toLowerCase().replace(/[^a-z0-9]+/g,"-")+".ics";
  document.body.appendChild(a);a.click();setTimeout(function(){URL.revokeObjectURL(a.href);a.remove();},400);
  toast("Kalender-Datei erstellt 📅 – öffne sie, um den Termin zu übernehmen.");
}
function icsEsc(s){return String(s).replace(/\\/g,"\\\\").replace(/;/g,"\\;").replace(/,/g,"\\,").replace(/\n/g,"\\n");}

/* ---------- Upload + KI ---------- */
var ALLOWED_IMG={"image/jpeg":1,"image/png":1,"image/webp":1,"image/gif":1};
function compressImage(file){
  return new Promise(function(res,rej){
    var url=URL.createObjectURL(file),img=new Image();
    img.onload=function(){
      var max=1800,w=img.naturalWidth,h=img.naturalHeight;
      var sc=Math.min(1,max/Math.max(w,h));
      var cv=document.createElement("canvas");cv.width=Math.round(w*sc);cv.height=Math.round(h*sc);
      cv.getContext("2d").drawImage(img,0,0,cv.width,cv.height);
      URL.revokeObjectURL(url);
      cv.toBlob(function(b){if(b)res(b);else rej(new Error("Bild konnte nicht verarbeitet werden."));},"image/jpeg",0.82);
    };
    img.onerror=function(){URL.revokeObjectURL(url);rej(new Error("Bildformat wird nicht unterstützt. Bitte JPG/PNG oder PDF verwenden."));};
    img.src=url;
  });
}
async function onAddFile(file){
  if(!file)return;
  if(!activeHousehold){toast("Kein Haushalt aktiv.",true);return;}
  var isPdf=file.type==="application/pdf"||/\.pdf$/i.test(file.name||"");
  if(!isPdf&&!ALLOWED_IMG[file.type]&&!/^image\//.test(file.type)){toast("Bitte ein PDF oder Foto (JPG/PNG) auswählen.",true);return;}
  if(isPdf&&file.size>12*1024*1024){toast("Das PDF ist größer als 12 MB – bitte eine kleinere Datei verwenden.",true);return;}
  showAiWork("Dokument wird vorbereitet …");
  var blob=file,mime=file.type||"application/pdf",fname=file.name||("scan-"+Date.now()+".jpg");
  try{
    if(!isPdf){blob=await compressImage(file);mime="image/jpeg";fname=fname.replace(/\.[^.]+$/,"")+".jpg";}
  }catch(e){hideAiWork();toast(errMsg(e),true);return;}
  /* 1) Ins Archiv hochladen (best effort, wie beim Tracker) */
  showAiWork("Dokument wird sicher abgelegt …");
  var docRow=null;
  try{
    var safe=fname.replace(/[^\wäöüÄÖÜß.\-]+/g,"_").slice(-80);
    var path=activeHousehold+"/"+Date.now()+"_"+safe;
    var up=await sb.storage.from(BUCKET).upload(path,blob,{contentType:mime,upsert:false});
    if(up.error)throw up.error;
    var ins=await sb.from("documents").insert({household_id:activeHousehold,filename:fname,storage_path:path,mime_type:mime,size_bytes:blob.size,doc_type:"sonstiges"}).select("*").single();
    if(ins.error)throw ins.error;
    docRow=ins.data;
  }catch(e){hideAiWork();toast("Ablegen fehlgeschlagen: "+errMsg(e),true);return;}
  /* 2) KI liest das Dokument */
  showAiWork("🎩 Der Butler liest das Dokument … (KI, ca. 10–30 Sek.)");
  var ext=null;
  try{
    var b64=await fileToBase64(blob);
    var r=await sb.functions.invoke(EDGE_FN,{body:{fileBase64:b64,mimeType:mime}});
    if(r.error)throw r.error;
    var body=r.data||{};
    if(body.error)throw new Error(body.error);
    ext=body.dokument||null;
  }catch(e){
    hideAiWork();
    await loadFromDB();
    reviewDoc=null;
    toast("Das Dokument wurde abgelegt, aber die KI-Analyse schlug fehl: "+errMsg(e),true);
    go("docs");return;
  }
  /* 3) Ergebnis am Dokument speichern */
  try{
    var upd={extracted:ext,doc_type:(ext&&DOCTYPE[ext.docType])?ext.docType:"sonstiges",doc_date:(ext&&ext.datum)||null,zusammenfassung:(ext&&ext.zusammenfassung)||null};
    var ru=await sb.from("documents").update(upd).eq("id",docRow.id);if(ru.error)throw ru.error;
  }catch(e){}
  hideAiWork();
  await loadFromDB();
  reviewDoc=DOCS.find(function(d){return d.id===docRow.id;})||docRow;
  renderApp();
}
function showAiWork(msg){var el=$("#aiWork");if(el){el.hidden=false;el.querySelector(".aimsg").textContent=msg;}}
function hideAiWork(){var el=$("#aiWork");if(el)el.hidden=true;}
function findMatch(ext){
  if(!ext)return null;
  var kd=(ext.kundennummer||"").replace(/\s+/g,"").toLowerCase();
  var vn=(ext.vertragsnummer||"").replace(/\s+/g,"").toLowerCase();
  var ab=(ext.anbieter||"").toLowerCase();
  var best=null;
  CONTRACTS.forEach(function(c){
    var ckd=(c.kundennummer||"").replace(/\s+/g,"").toLowerCase();
    var cvn=(c.vertragsnummer||"").replace(/\s+/g,"").toLowerCase();
    if(kd&&ckd&&kd===ckd){best=c;return;}
    if(vn&&cvn&&vn===cvn){best=c;return;}
    if(!best&&ab&&c.anbieter&&(ab.indexOf(c.anbieter.toLowerCase())>=0||c.anbieter.toLowerCase().indexOf(ab)>=0)&&(ext.kategorie===c.kategorie))best=c;
  });
  return best;
}

function showAuth(show){document.body.classList.toggle("app-hidden",show);var a=$("#authscreen");if(a)a.hidden=!show;}
function authMsg(text,kind){var m=$("#auth_msg");if(!m)return;if(!text){m.hidden=true;m.textContent="";return;}m.hidden=false;m.textContent=text;m.className="authmsg "+(kind||"");}
function loginErrorText(e){var m=errMsg(e);if(/invalid login/i.test(m))return "E-Mail oder Passwort ist falsch.";if(/email not confirmed/i.test(m))return "Bitte bestätige zuerst deine E-Mail-Adresse (Link in der Bestätigungs-Mail).";if(/already registered|already been registered/i.test(m))return "Für diese E-Mail gibt es bereits ein Konto. Bitte melde dich an.";if(/rate limit|too many/i.test(m))return "Zu viele Versuche. Bitte kurz warten und erneut probieren.";return m;}
async function doLogin(){
  var email=($("#auth_email").value||"").trim(),pass=$("#auth_pass").value||"";
  if(!email||!pass){authMsg("Bitte E-Mail und Passwort eingeben.","err");return;}
  authMsg("Anmeldung läuft …","");
  try{var r=await sb.auth.signInWithPassword({email:email,password:pass});if(r.error){authMsg(loginErrorText(r.error),"err");return;}authMsg("",null);}
  catch(e){authMsg(loginErrorText(e),"err");}
}
async function doSignup(){
  var email=($("#auth_email").value||"").trim(),pass=$("#auth_pass").value||"";
  if(!email||!pass){authMsg("Bitte E-Mail und Passwort eingeben.","err");return;}
  if(pass.length<6){authMsg("Das Passwort muss mindestens 6 Zeichen haben.","err");return;}
  authMsg("Konto wird erstellt …","");
  try{
    var r=await sb.auth.signUp({email:email,password:pass});
    if(r.error){authMsg(loginErrorText(r.error),"err");return;}
    if(r.data&&r.data.session)authMsg("Konto erstellt – du wirst angemeldet …","ok");
    else authMsg("Konto erstellt. Bitte bestätige die E-Mail, die wir dir geschickt haben, und melde dich anschließend an.","ok");
  }catch(e){authMsg(loginErrorText(e),"err");}
}
async function doLogout(){try{await sb.auth.signOut();}catch(e){}authMsg("",null);var p=$("#auth_pass");if(p)p.value="";}
var pendingRecovery=(/type=recovery/i.test(location.hash)||/[?&]type=recovery/i.test(location.search));
function showResetMode(on){
  var lp=$("#auth_login_panel"),rp=$("#auth_reset_panel"),sub=$("#auth_sub");
  if(lp)lp.hidden=on;if(rp)rp.hidden=!on;
  if(sub)sub.textContent=on?"Bitte vergib jetzt dein neues Passwort.":"Bitte melde dich an – dein Butler kümmert sich um den Papierkram.";

async function doForgot(){
  var email=($("#auth_email").value||"").trim();
  if(!email){authMsg("Bitte zuerst deine E-Mail-Adresse oben eingeben.","err");return;}
  authMsg("E-Mail wird gesendet …","");
  try{
    var r=await sb.auth.resetPasswordForEmail(email,{redirectTo:location.origin+location.pathname});
    if(r.error){authMsg(loginErrorText(r.error),"err");return;}
    authMsg("Wir haben dir eine E-Mail zum Zurücksetzen geschickt. Bitte klicke den Link darin an.","ok");
  }catch(e){authMsg(loginErrorText(e),"err");}
}
async function doSetPassword(){
  var p=$("#auth_newpass").value||"";
  if(p.length<6){authMsg("Das Passwort muss mindestens 6 Zeichen haben.","err");return;}
  authMsg("Passwort wird gespeichert …","");
  try{
    var r=await sb.auth.updateUser({password:p});
    if(r.error){authMsg(loginErrorText(r.error),"err");return;}
    pendingRecovery=false;showResetMode(false);
    authMsg("Passwort geändert ✅ Du wirst angemeldet …","ok");
    var s=await sb.auth.getSession();
    if(s&&s.data&&s.data.session)handleSession(s.data.session);
  }catch(e){authMsg(loginErrorText(e),"err");}
}
function enterRecovery(session){
  currentUser=session?session.user:null;enteredUserId=null;

  if(!code){toast("Bitte den Einladungs-Code eingeben.",true);if(inp)inp.focus();return;}
  try{
    var r=await sbPub.rpc("redeem_invite",{p_code:code});
    if(r.error)throw r.error;
    await loadHouseholds();
    await switchHousehold(r.data);
    toast("Haushalt beigetreten ✅");
  }catch(e){var m=errMsg(e);if(/invalid_or_expired/i.test(m))m="Code ungültig oder abgelaufen.";toast(m,true);}
}

/* ---------- Session ---------- */
async function enterApp(session){
  currentUser=session.user;showAuth(false);
  try{await loadHouseholds();}catch(e){}
  try{await loadFromDB();}catch(e){toast("Daten konnten nicht geladen werden: "+errMsg(e),true);}
  renderApp();
}
function handleSession(session){
  if(session&&session.user){
    if(enteredUserId===session.user.id){currentUser=session.user;return;}
    enteredUserId=session.user.id;enterApp(session);
  }else{
    enteredUserId=null;currentUser=null;CONTRACTS=[];DOCS=[];HOUSEHOLDS=[];activeHousehold=null;
    var app=$("#app");if(app)app.innerHTML="";
    showAuth(true);
  }
}

/* ---------- Theme ---------- */
function applyTheme(dark){
  document.body.classList.toggle("dark",!!dark);
  var b=$("#themeBtn");if(b)b.textContent=dark?"☀️":"🌙";
  var tc=document.querySelector('meta[name="theme-color"]');if(tc)tc.setAttribute("content",dark?"#09090b":"#1d4ed8");
  try{localStorage.setItem("dbTheme",dark?"dark":"light");}catch(e){}
}

/* ---------- Events ---------- */
function onAppClick(e){
  var nav=e.target.closest("[data-nav]");
  if(nav){if(nav.dataset.nav==="add")reviewDoc=null;go(nav.dataset.nav);return;}
  var b=e.target.closest("[data-action]");if(!b)return;
  var act=b.dataset.action,id=b.dataset.id;
  if(act==="open-contract"){detailId=id;activeView="contract-detail";renderApp();window.scrollTo({top:0,behavior:"smooth"});}
  else if(act==="new-contract"){editId=null;formPrefill=null;pendingDoc=null;activeView="contract-form";renderApp();}
  else if(act==="edit-contract"){editId=id;formPrefill=null;activeView="contract-form";renderApp();}
  else if(act==="save-contract")onSaveContract();
  else if(act==="del-contract")deleteContract(id);
  else if(act==="mark-cancelled")setContractStatus(id,"gekuendigt");
  else if(act==="mark-active")setContractStatus(id,"aktiv");
  else if(act==="ics"){var c=contractById(id);if(c)icsDownload(c);}
  else if(act==="doc-view")viewDoc(id);
  else if(act==="doc-del")deleteDoc(id);
  else if(act==="doc-link")docLinkUI(id);
  else if(act==="pick-cam"){var fc=$("#fileCam");if(fc)fc.click();}
  else if(act==="pick-file"){var fp=$("#filePick");if(fp)fp.click();}
  else if(act==="review-link"){if(reviewDoc)linkDoc(reviewDoc.id,id).then(function(){reviewDoc=null;detailId=id;activeView="contract-detail";renderApp();});}
  else if(act==="review-new"){
    if(reviewDoc){formPrefill=reviewDoc.extracted||null;pendingDoc=reviewDoc.id;reviewDoc=null;}
    editId=null;activeView="contract-form";renderApp();
  }
  else if(act==="review-done"){reviewDoc=null;go("docs");toast("Im Archiv abgelegt ✅");}
  else if(act==="hh-switch")switchHousehold(id);
  else if(act==="hh-rename")renameHouseholdUI();
  else if(act==="hh-invite")inviteUI();
  else if(act==="hh-copy")copyInvite(b.dataset.code);
  else if(act==="hh-join")joinUI();
  else if(act==="export-json")exportJSON();
  else if(act==="logout")doLogout();
}
function docLinkUI(docId){
  if(!CONTRACTS.length){toast("Lege zuerst einen Vertrag an, dann kannst du zuordnen.",true);return;}
  var d=DOCS.find(function(x){return x.id===docId;});if(!d)return;
  var list=CONTRACTS.map(function(c,i){return (i+1)+" = "+(c.anbieter||"?")+(c.produkt?" ("+c.produkt+")":"");}).join("\n");
  var input=prompt("Welchem Vertrag zuordnen?\n\n"+list+"\n\n0 = Zuordnung entfernen",d.contract_id?"":"1");
  if(input===null)return;
  var n=parseInt(input,10);
  if(n===0){linkDoc(docId,null);return;}
  if(!n||n<1||n>CONTRACTS.length){toast("Ungültige Auswahl.",true);return;}
  linkDoc(docId,CONTRACTS[n-1].id);
}
function onAppChange(e){
  if(e.target.id==="fileCam"||e.target.id==="filePick"){
    var f=e.target.files&&e.target.files[0];e.target.value="";
    if(f)onAddFile(f);
  }
  else if(e.target.id==="df_kat"){docFilter.kat=e.target.value;renderApp();}
  else if(e.target.id==="df_typ"){docFilter.typ=e.target.value;renderApp();}
}
function onAppInput(e){
  if(e.target.id==="df_q"){docFilter.q=e.target.value;
    clearTimeout(onAppInput._t);onAppInput._t=setTimeout(function(){var el=$("#df_q");var pos=el?el.selectionStart:0;renderApp();var el2=$("#df_q");if(el2){el2.focus();el2.setSelectionRange(pos,pos);}},350);}
}

/* ---------- Init ---------- */
function init(){
  var saved="";try{saved=localStorage.getItem("dbTheme")||"";}catch(e){}
  if(!saved)saved=(window.matchMedia&&window.matchMedia("(prefers-color-scheme: dark)").matches)?"dark":"light";
  applyTheme(saved==="dark");
  var tb=$("#themeBtn");if(tb)tb.addEventListener("click",function(){applyTheme(!document.body.classList.contains("dark"));});
  var app=$("#app");
  app.addEventListener("click",onAppClick);
  app.addEventListener("change",onAppChange);
  app.addEventListener("input",onAppInput);
  function onNav(e){var b=e.target.closest("[data-nav]");if(b){if(b.dataset.nav==="add")reviewDoc=null;go(b.dataset.nav);}}
  var t=$("#tabs");if(t)t.addEventListener("click",onNav);
  var tf=$("#tabsFoot");if(tf)tf.addEventListener("click",onNav);
  var tm=$("#tabsMobile");if(tm)tm.addEventListener("click",onNav);
  $("#auth_login").addEventListener("click",doLogin);
  $("#auth_signup").addEventListener("click",doSignup);
  $("#auth_forgot").addEventListener("click",doForgot);
  $("#auth_setpass").addEventListener("click",doSetPassword);
  $("#auth_pass").addEventListener("keydown",function(e){if(e.key==="Enter")doLogin();});
  sb.auth.onAuthStateChange(function(event,session){
    if(event==="PASSWORD_RECOVERY"){enterRecovery(session);return;}
    if(pendingRecovery&&session){enterRecovery(session);return;}
    handleSession(session);
  });
  sb.auth.getSession().then(function(r){
    var session=r&&r.data?r.data.session:null;
    if(pendingRecovery&&session){enterRecovery(session);return;}
    handleSession(session);
  });
  if("serviceWorker" in navigator){try{navigator.serviceWorker.register("sw.js");}catch(e){}}
}
document.addEventListener("DOMContentLoaded",init);
})();
</script>
</body>
</html>
